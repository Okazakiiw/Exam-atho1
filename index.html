<script>
    // ==========================================

    const chapter1Data = [
        { question: "1. A 65-year-old male presents with difficulty urinating and a weak urinary stream. A digital rectal examination reveals an enlarged, nodular prostate gland. Biopsy shows an increase in both glandular and stromal cells. Which of the following best describes this cellular adaptation?", options: ["A. Hypertrophy", "B. Hyperplasia", "C. Metaplasia", "D. Dysplasia", "E. Neoplasia"], correctAnswer: 1, explanation: "เฉลย: B. Hyperplasia\nคำอธิบาย: การเพิ่มจำนวนของเซลล์ทั้ง glandular และ stromal ในต่อมลูกหมากโต (BPH) คือกระบวนการ Hyperplasia" },
        { question: "2. A 25-year-old competitive weightlifter has significantly increased the circumference of his biceps over the past year. A muscle biopsy would reveal enlarged skeletal muscle fibers. This enlargement is primarily driven by which of the following mechanisms?", options: ["A. Increased number of muscle stem cells", "B. Accumulation of intracellular fluid (edema)", "C. Increased synthesis of structural proteins and myofilaments", "D. Transformation of fibroblasts into muscle cells", "E. Reduced rate of normal cellular apoptosis"], correctAnswer: 2, explanation: "เฉลย: C. Increased synthesis of structural proteins and myofilaments\nคำอธิบาย: กล้ามเนื้อลายที่ขยายขนาดขึ้นจากการออกกำลังกายเกิดจาก Hypertrophy ซึ่งมาจากการสังเคราะห์โปรตีนโครงสร้างเพิ่มขึ้น" },
        { question: "3. A 40-year-old male breaks his leg and has a plaster cast applied. When the cast is removed six weeks later, he notices that his immobilized calf is visibly smaller than the other. Which intracellular pathway is predominantly responsible for the degradation of cytoskeletal proteins leading to this change?", options: ["A. Ubiquitin-proteasome pathway", "B. Caspase activation cascade", "C. Fas-FasL death receptor pathway", "D. Anaerobic glycolysis", "E. Reactive oxygen species generation"], correctAnswer: 0, explanation: "เฉลย: A. Ubiquitin-proteasome pathway\nคำอธิบาย: ภาวะกล้ามเนื้อลีบจากการไม่ได้ใช้งาน (Disuse atrophy) เกิดจากการย่อยสลายโปรตีนภายในเซลล์ผ่านกลไก Ubiquitin-proteasome" },
        { question: "4. A 55-year-old male with a 30-pack-year smoking history undergoes a bronchoscopy. A biopsy of the respiratory tract reveals that the normal ciliated pseudostratified columnar epithelium is replaced by stratified squamous epithelium. This cellular change is an example of:", options: ["A. Hyperplasia", "B. Dysplasia", "C. Metaplasia", "D. Atrophy", "E. Carcinoma in situ"], correctAnswer: 2, explanation: "เฉลย: C. Metaplasia\nคำอธิบาย: การเปลี่ยนชนิดเซลล์ที่โตเต็มที่จากชนิดหนึ่งเป็นอีกชนิดหนึ่งเพื่อทนต่อสิ่งเร้า (การสูบบุหรี่) เรียกว่า Metaplasia" },
        { question: "5. A 30-year-old female has an abnormal Pap smear. Cervical biopsy reveals disordered growth and maturation of the squamous epithelium, with loss of basal polarity, nuclear hyperchromasia, and pleomorphism, but the basement membrane is intact. What is the correct term for these cellular changes?", options: ["A. Physiologic hyperplasia", "B. Ischemic necrosis", "C. Metaplasia", "D. Dysplasia", "E. Anaplasia"], correctAnswer: 3, explanation: "เฉลย: D. Dysplasia\nคำอธิบาย: การเจริญเติบโตของเซลล์ที่ผิดปกติ รูปร่างหลากหลาย นิวเคลียสสีเข้ม แต่ยังไม่ทะลุ basement membrane คือลักษณะของ Dysplasia" },
        { question: "6. A 65-year-old male with atrial fibrillation develops sudden onset of severe left flank pain and hematuria. Imaging reveals a wedge-shaped, pale lesion in the renal cortex. Microscopic examination of the tissue shows basic preservation of tissue architecture, but the cells are intensely eosinophilic and anucleated. Which type of necrosis is present?", options: ["A. Caseous necrosis", "B. Liquefactive necrosis", "C. Coagulative necrosis", "D. Fibrinoid necrosis", "E. Fat necrosis"], correctAnswer: 2, explanation: "เฉลย: C. Coagulative necrosis\nคำอธิบาย: เนื้อตายที่ยังคงโครงสร้างเนื้อเยื่อไว้ได้ เซลล์ไม่มีนิวเคลียส ติดสีชมพูเข้ม (eosinophilic) เป็นลักษณะเฉพาะของ Coagulative necrosis จากการขาดเลือด" },
        { question: "7. A 35-year-old female is admitted with severe bacterial pneumonia. She develops a thick, purulent sputum. Chest X-ray reveals a cavitary lesion in the right upper lobe. Biopsy of the cavity wall shows a mass of necrotic tissue, cellular debris, and numerous neutrophils. The transformation of the tissue into a viscous liquid mass is mediated primarily by:", options: ["A. Denaturation of structural proteins", "B. Ischemic shutdown of the Krebs cycle", "C. Release of lysosomal enzymes from leukocytes", "D. T-cell mediated cytotoxicity", "E. Saponification of released triglycerides"], correctAnswer: 2, explanation: "เฉลย: C. Release of lysosomal enzymes from leukocytes\nคำอธิบาย: การติดเชื้อแบคทีเรียทำให้เกิด Liquefactive necrosis (เป็นหนองเหลว) ซึ่งเป็นผลจากการย่อยสลายโดยเอนไซม์ไลโซโซมจากเม็ดเลือดขาว (neutrophils)" },
        { question: "8. A 40-year-old male immigrant presents with chronic cough, weight loss, and fever. A chest X-ray shows apical consolidation. Biopsy of a hilar lymph node reveals granulomas with a central, friable, granular, cheese-like material. Under the microscope, this center appears as amorphous, eosinophilic debris with completely obliterated tissue architecture. What is the diagnosis?", options: ["A. Coagulative necrosis", "B. Caseous necrosis", "C. Gangrenous necrosis", "D. Fat necrosis", "E. Fibrinoid necrosis"], correctAnswer: 1, explanation: "เฉลย: B. Caseous necrosis\nคำอธิบาย: เนื้อตายที่มีลักษณะคล้ายชีส (cheese-like) และไม่มีโครงสร้างเซลล์เหลืออยู่เลยเมื่อดูผ่านกล้องจุลทรรศน์ เป็นลักษณะเด่นของ Caseous necrosis ที่พบในวัณโรค" },
        { question: "9. A 45-year-old male with chronic alcohol abuse presents with severe, radiating abdominal pain. Serum amylase and lipase are highly elevated. Surgery reveals chalky-white, opaque nodules on the surface of the omentum and mesentery. Which pathologic process is directly responsible for the appearance of these nodules?", options: ["A. Enzymatic destruction of fat leading to saponification", "B. Ischemic necrosis of the mesenteric vessels", "C. Widespread bacterial infection and abscess formation", "D. Dystrophic calcification of tumor masses", "E. Accumulation of intracellular cholesterol esters"], correctAnswer: 0, explanation: "เฉลย: A. Enzymatic destruction of fat leading to saponification\nคำอธิบาย: ในภาวะตับอ่อนอักเสบเฉียบพลัน เอนไซม์จะย่อยสลายไขมัน (Fat necrosis) ทำให้เกิดการจับตัวกับแคลเซียมกลายเป็นจุดขาวคล้ายชอล์ก เรียกว่า Saponification" },
        { question: "10. A 30-year-old female with systemic lupus erythematosus (SLE) presents with severely elevated blood pressure (malignant hypertension). A renal biopsy reveals characteristic bright pink, amorphous material within the walls of the damaged arterioles. This type of necrosis is predominantly composed of:", options: ["A. Digested lipid membranes", "B. Denatured intracellular structural proteins", "C. Immune complexes and leaked plasma fibrin", "D. Caseating granulomatous debris", "E. Liquefied brain parenchyma"], correctAnswer: 2, explanation: "เฉลย: C. Immune complexes and leaked plasma fibrin\nคำอธิบาย: Fibrinoid necrosis เกิดจากการสะสมของ Immune complexes และโปรตีนจากพลาสมา (เช่น fibrin) ที่รั่วซึมเข้าสู่ผนังหลอดเลือดที่ได้รับความเสียหาย" },
        { question: "11. A 72-year-old male with poorly controlled diabetes mellitus presents with a black, foul-smelling, cold left big toe. The clinical presentation of 'wet gangrene' is best explained by which combination of tissue changes?", options: ["A. Coagulative necrosis superimposed with liquefactive necrosis from bacterial infection", "B. Caseous necrosis followed by dystrophic calcification", "C. Fibrinoid necrosis complicated by fat necrosis", "D. Atrophy followed by extensive apoptosis", "E. Pure enzymatic fat digestion without ischemia"], correctAnswer: 0, explanation: "เฉลย: A. Coagulative necrosis superimposed with liquefactive necrosis from bacterial infection\nคำอธิบาย: Wet gangrene คือภาวะเนื้อตายจากการขาดเลือด (Coagulative necrosis) ที่มีการติดเชื้อแบคทีเรียซ้ำซ้อน ทำให้เกิดการย่อยสลายเนื้อเยื่อจนเหลว (Liquefactive necrosis) ร่วมด้วย" },
        { question: "12. A 20-year-old female receives targeted radiation therapy for a localized tumor. The radiation causes unrepairable DNA damage in the targeted cells, leading to programmed cell death without triggering an inflammatory response. Which of the following molecules is released from the mitochondria into the cytosol to initiate this specific intrinsic pathway?", options: ["A. Caspase 8", "B. Cytochrome c", "C. Tumor necrosis factor (TNF)", "D. Calcium ions", "E. Reactive oxygen species (ROS)"], correctAnswer: 1, explanation: "เฉลย: B. Cytochrome c\nคำอธิบาย: การกระตุ้น Apoptosis ผ่าน intrinsic (mitochondrial) pathway จะมีการปล่อย Cytochrome c ออกจากไมโทคอนเดรียเข้าสู่ไซโตซอลเพื่อกระตุ้น Caspase cascade" },
        { question: "13. Cytotoxic T-lymphocytes (CD8+ cells) recognize and kill virus-infected host cells. To do this, they can induce apoptosis in the target cell by activating the extrinsic pathway. Which receptor-ligand interaction is primarily responsible for this direct activation?", options: ["A. IL-1/IL-1 receptor", "B. FasL / Fas (CD95)", "C. CD40L/CD40", "D. VEGF / VEGFR", "E. Integrin / Selectin"], correctAnswer: 1, explanation: "เฉลย: B. FasL / Fas (CD95)\nคำอธิบาย: Extrinsic pathway ของ Apoptosis ถูกกระตุ้นผ่าน death receptors ซึ่งการจับกันระหว่าง FasL (บน T-cell) และ Fas receptor (CD95) เป็นกลไกสำคัญ" },
        { question: "14. A patient experiences a transient ischemic attack (TIA) resulting in a temporary decrease in blood flow to the brain. During this early, reversible stage of cellular injury, hypoxia leads to a drop in intracellular ATP. Which of the following is an immediate morphological consequence of the failure of the energy-dependent Na+/K+ pump?", options: ["A. Karyorrhexis", "B. Deposition of lipofuscin", "C. Cellular swelling (hydropic change)", "D. Rupture of lysosomes", "E. Formation of apoptotic bodies"], correctAnswer: 2, explanation: "เฉลย: C. Cellular swelling (hydropic change)\nคำอธิบาย: เมื่อ ATP ลดลง Na+/K+ pump จะไม่ทำงาน ทำให้โซเดียมสะสมในเซลล์ น้ำจึงออสโมซิสตามเข้าไป ทำให้เซลล์บวมน้ำ (Cellular swelling) ซึ่งเป็นรอยโรคระยะแรกที่ผันกลับได้" },
        { question: "15. Cardiac myocytes are subjected to severe, prolonged ischemia. The transition from reversible to irreversible cell injury is marked by several critical biochemical and structural changes. Which of the following represents the most definitive hallmark of irreversible cell death in this context?", options: ["A. Detachment of ribosomes from the rough ER", "B. Clumping of nuclear chromatin", "C. Profound disruption of plasma and lysosomal membranes", "D. Mild cellular swelling and surface blebbing", "E. Accumulation of intracellular lactic acid"], correctAnswer: 2, explanation: "เฉลย: C. Profound disruption of plasma and lysosomal membranes\nคำอธิบาย: จุดที่บ่งบอกถึง Irreversible cell injury คือความเสียหายอย่างรุนแรงต่อเยื่อหุ้มเซลล์ (plasma membrane) และเยื่อหุ้มไลโซโซม ทำให้เอนไซม์รั่วออกมาย่อยเซลล์" },
        { question: "16. A 50-year-old obese, non-alcoholic male with type 2 diabetes has mildly elevated liver enzymes. An ultrasound shows an enlarged, echogenic liver. A liver biopsy demonstrates large, clear lipid vacuoles occupying the cytoplasm of most hepatocytes. This condition is an example of:", options: ["A. Pathologic calcification", "B. Steatosis (fatty change)", "C. Glycogen storage disease", "D. Amyloidosis", "E. Hemosiderosis"], correctAnswer: 1, explanation: "เฉลย: B. Steatosis (fatty change)\nคำอธิบาย: การสะสมของไตรกลีเซอไรด์ในเซลล์ตับเป็นถุงไขมัน (lipid vacuoles) เรียกว่า Steatosis หรือภาวะไขมันพอกตับ" },
        { question: "17. A 60-year-old male with multiple myeloma has an overproduction of abnormal antibodies. A bone marrow biopsy reveals plasma cells containing large, homogeneous, eosinophilic cytoplasmic inclusions known as Russell bodies. What do these inclusions primarily consist of?", options: ["A. Excess glycogen", "B. Denatured intermediate filaments", "C. Accumulated immunoglobulins", "D. Lipofuscin pigment", "E. Cholesterol crystals"], correctAnswer: 2, explanation: "เฉลย: C. Accumulated immunoglobulins\nคำอธิบาย: Russell bodies ในพลาสมาเซลล์ คือการสะสมของโปรตีนแอนติบอดี (Immunoglobulins) ที่ผลิตออกมามากเกินไป" },
        { question: "18. A 2-year-old child presents with severe hypoglycemia and hepatomegaly. A liver biopsy reveals large, clear, cytoplasmic vacuoles in the hepatocytes that stain strongly positive with Periodic Acid-Schiff (PAS) and are sensitive to diastase digestion. The child most likely has a genetic defect leading to the abnormal accumulation of:", options: ["A. Neutral fats", "B. Complex proteins", "C. Glycogen", "D. Mucopolysaccharides", "E. Iron"], correctAnswer: 2, explanation: "เฉลย: C. Glycogen\nคำอธิบาย: สารที่ติดสี PAS positive และถูกย่อยสลายได้ด้วยเอนไซม์ diastase คือ ไกลโคเจน (Glycogen)" },
        { question: "19. An 82-year-old female dies of congestive heart failure. At autopsy, her heart is small and brown. Histological examination reveals perinuclear clusters of yellow-brown, granular pigment within the cardiac myocytes. This pigment is best considered a sign of:", options: ["A. Acute ischemic injury", "B. Previous hemorrhage and red blood cell breakdown", "C. Past free radical injury and lipid peroxidation", "D. Genetic defect in melanin synthesis", "E. Exogenous accumulation of carbon dust"], correctAnswer: 2, explanation: "เฉลย: C. Past free radical injury and lipid peroxidation\nคำอธิบาย: รงควัตถุสีเหลืองน้ำตาลในเซลล์กล้ามเนื้อหัวใจคนแก่คือ Lipofuscin ซึ่งเป็นผลพวงจากการบาดเจ็บจากอนุมูลอิสระ (free radicals) และ lipid peroxidation ที่สะสมมานาน" },
        { question: "20. A 50-year-old male presents with skin hyperpigmentation, diabetes mellitus, and liver cirrhosis (bronze diabetes). Laboratory tests show highly elevated serum ferritin. A liver biopsy stained with Prussian blue reveals abundant blue granules within the hepatocytes. What is the composition of this pigment?", options: ["A. Bilirubin", "B. Melanin", "C. Lipofuscin", "D. Hemosiderin", "E. Ceroid"], correctAnswer: 3, explanation: "เฉลย: D. Hemosiderin\nคำอธิบาย: การย้อมติดสี Prussian blue แสดงถึงการสะสมของธาตุเหล็กในรูปของ Hemosiderin" },
        { question: "21. A 25-year-old female was hit in the eye with a tennis ball. Over the next two weeks, the 'black eye' changes color from red-blue to green-blue and finally to golden-yellow. The final golden-yellow color is due to the local presence of macrophages engulfing and accumulating which substance derived from hemoglobin?", options: ["A. Melanin", "B. Lipofuscin", "C. Hemosiderin", "D. Myoglobin", "E. Carbon"], correctAnswer: 2, explanation: "เฉลย: C. Hemosiderin\nคำอธิบาย: รอยฟกช้ำที่เปลี่ยนเป็นสีเหลืองทองในระยะสุดท้ายเกิดจากการที่ Macrophages เก็บกินเม็ดเลือดแดงแล้วเปลี่ยนฮีโมโกลบินไปเป็น Hemosiderin" },
        { question: "22. A 35-year-old female with Addison disease presents with generalized darkening of her skin and oral mucosa. A biopsy of the oral mucosa shows increased deposition of a brown-black pigment in the basal layer of the epithelium. This endogenous pigment is synthesized from which of the following precursors?", options: ["A. Tryptophan", "B. Porphyrin", "C. Tyrosine", "D. Cholesterol", "E. Glycine"], correctAnswer: 2, explanation: "เฉลย: C. Tyrosine\nคำอธิบาย: รงควัตถุสีน้ำตาลดำคือ Melanin ซึ่งสังเคราะห์มาจากกรดอะมิโน Tyrosine โดยเอนไซม์ tyrosinase ในเมลาโนไซต์" },
        { question: "23. A 60-year-old woman undergoes a routine screening mammogram, which shows clustered microcalcifications. A core biopsy reveals ductal carcinoma in situ with areas of central necrosis containing basophilic, amorphous deposits. Her serum calcium levels are strictly within normal limits. This finding is an example of:", options: ["A. Metastatic calcification", "B. Dystrophic calcification", "C. Ossification", "D. Amyloidosis", "E. Hyaline change"], correctAnswer: 1, explanation: "เฉลย: B. Dystrophic calcification\nคำอธิบาย: การสะสมของแคลเซียมในเนื้อเยื่อที่ตายหรือบาดเจ็บ (เช่น บริเวณเนื้อตายของมะเร็ง) โดยที่ระดับแคลเซียมในเลือดปกติ เรียกว่า Dystrophic calcification" },
        { question: "24. A 45-year-old male with chronic renal failure and secondary hyperparathyroidism undergoes a chest X-ray, revealing fine calcifications in the alveolar septa. His serum calcium levels are significantly elevated. Which of the following best describes this pathological mechanism?", options: ["A. Deposition of calcium salts in previously damaged, necrotic tissue", "B. Metaplasia of lung tissue into osteoblasts", "C. Systemic deposition of calcium in normal tissues due to hypercalcemia", "D. Intracellular accumulation of calcium leading to apoptosis", "E. Reaction to a foreign body inhaled into the lungs"], correctAnswer: 2, explanation: "เฉลย: C. Systemic deposition of calcium in normal tissues due to hypercalcemia\nคำอธิบาย: ภาวะที่มีแคลเซียมไปสะสมในเนื้อเยื่อปกติอันเป็นผลมาจากระดับแคลเซียมในเลือดสูง (hypercalcemia) เรียกว่า Metastatic calcification" },
        { question: "25. A 60-year-old male experiences an acute myocardial infarction. He is successfully treated with a stent, restoring blood flow. However, myocardial damage paradoxically worsens shortly after reperfusion. The generation of which of the following substances upon the reintroduction of oxygen is primarily responsible for this additional injury?", options: ["A. Lactic acid", "B. Intracellular sodium", "C. Reactive oxygen species (ROS)", "D. Proteasomes", "E. Glycogen granules"], correctAnswer: 2, explanation: "เฉลย: C. Reactive oxygen species (ROS)\nคำอธิบาย: Reperfusion injury หรือความเสียหายที่เพิ่มขึ้นหลังเปิดเลือดให้ไหลกลับเข้าไปใหม่ เกิดจากการสร้างอนุมูลอิสระ (ROS) จำนวนมากเมื่อเนื้อเยื่อได้รับออกซิเจนอีกครั้ง" },
        { question: "26. An industrial worker is accidentally exposed to high levels of carbon tetrachloride (CCl4). Within 24 hours, he develops signs of severe acute hepatic failure. The toxicity of CCl4 is primarily mediated by its conversion in the smooth endoplasmic reticulum to a highly reactive toxic free radical by which enzyme system?", options: ["A. Monoamine oxidase", "B. Cytochrome P450", "C. Superoxide dismutase", "D. Catalase", "E. Glutathione peroxidase"], correctAnswer: 1, explanation: "เฉลย: B. Cytochrome P450\nคำอธิบาย: CCl4 จะถูกเอนไซม์ Cytochrome P450 ในตับเปลี่ยนรูปเป็นสารพิษอนุมูลอิสระ (CCl3 radical) ซึ่งทำลายเซลล์ตับ" },
        { question: "27. Normal somatic cells have a limited capacity for replication and eventually enter a state of non-dividing cellular senescence. This replicative limit is primarily linked to the progressive shortening of which chromosomal structure during each cell division?", options: ["A. Centromeres", "B. Kinetochores", "C. Telomeres", "D. Histones", "E. Promoters"], correctAnswer: 2, explanation: "เฉลย: C. Telomeres\nคำอธิบาย: เซลล์ปกติจะเข้าสู่ภาวะชราภาพ (senescence) เมื่อส่วนปลายของโครโมโซมที่เรียกว่า Telomeres หดสั้นลงเรื่อยๆ หลังจากการแบ่งเซลล์แต่ละครั้ง" },
        { question: "28. A 40-year-old male goes on an extreme fasting diet for several weeks. To survive under nutrient deprivation, his cells begin to encapsulate portions of their own cytoplasm and organelles into vacuoles, which then fuse with lysosomes for degradation and nutrient recycling. This survival mechanism is known as:", options: ["A. Heterophagy", "B. Apoptosis", "C. Autophagy", "D. Phagocytosis", "E. Exocytosis"], correctAnswer: 2, explanation: "เฉลย: C. Autophagy\nคำอธิบาย: การที่เซลล์ย่อยสลายออร์แกเนลล์ของตัวเองเพื่อนำสารอาหารกลับมาใช้ใหม่ในช่วงขาดสารอาหาร เรียกว่า Autophagy" },
        { question: "29. A 75-year-old female with progressive memory loss is diagnosed with Alzheimer's disease. Pathological examination of her brain post-mortem reveals the presence of extracellular amyloid plaques and intracellular neurofibrillary tangles. These findings are a direct manifestation of which cellular pathology?", options: ["A. Defective lipid metabolism", "B. Abnormal protein folding and aggregation", "C. Pathologic glycogen accumulation", "D. Metastatic calcification", "E. Excessive telomerase activity"], correctAnswer: 1, explanation: "เฉลย: B. Abnormal protein folding and aggregation\nคำอธิบาย: Amyloid plaques และ neurofibrillary tangles ในโรคอัลไซเมอร์ เกิดจากการพับตัวของโปรตีนที่ผิดปกติและการรวมกลุ่มกัน (protein aggregation)" },
        { question: "30. During severe cellular ischemia, the depletion of ATP leads to a series of progressive cellular dysfunctions. Which of the following is the direct consequence of the detachment of ribosomes from the rough endoplasmic reticulum due to decreased energy?", options: ["A. Decreased protein synthesis", "B. Increased lipid peroxidation", "C. Uncontrolled DNA replication", "D. Activation of pro-apoptotic caspases", "E. Immediate rupture of the cell membrane"], correctAnswer: 0, explanation: "เฉลย: A. Decreased protein synthesis\nคำอธิบาย: ไรโบโซมมีหน้าที่สังเคราะห์โปรตีน เมื่อไรโบโซมหลุดออกจาก rough ER เนื่องจาก ATP ลดลง จะส่งผลให้การสังเคราะห์โปรตีนลดลง" },
        { question: "31. A 55-year-old female experiences the cessation of her menstrual cycles (menopause). Over the next few years, an ultrasound reveals that her uterus has significantly decreased in size. This physiological decrease in organ size is an example of cellular atrophy primarily caused by:", options: ["A. Chronic ischemia", "B. Loss of endocrine stimulation", "C. Denervation", "D. Inadequate nutrition", "E. Increased physical pressure"], correctAnswer: 1, explanation: "เฉลย: B. Loss of endocrine stimulation\nคำอธิบาย: มดลูกที่ฝ่อเล็กลงในวัยหมดประจำเดือน เกิดจากการขาดฮอร์โมนเอสโตรเจนที่คอยกระตุ้น (Loss of endocrine stimulation)" },
        { question: "32. A 28-year-old pregnant female experiences a dramatic enlargement of her uterus to accommodate the growing fetus. Microscopic examination of the myometrium would reveal that the smooth muscle cells have undergone which combination of cellular adaptations?", options: ["A. Hypertrophy and hyperplasia", "B. Hyperplasia and metaplasia", "C. Metaplasia and dysplasia", "D. Atrophy and hypertrophy", "E. Hyperplasia and apoptosis"], correctAnswer: 0, explanation: "เฉลย: A. Hypertrophy and hyperplasia\nคำอธิบาย: กล้ามเนื้อมดลูก (smooth muscle) ในคนท้องสามารถขยายตัวได้ทั้งจากการเพิ่มขนาดเซลล์ (Hypertrophy) และการเพิ่มจำนวนเซลล์ (Hyperplasia)" },
        { question: "33. A 5-year-old boy from an impoverished region presents with severe malnutrition, night blindness, and extremely dry eyes (xerophthalmia). Examination of his conjunctiva reveals that the normal delicate epithelium has been replaced by thick, keratinizing stratified squamous epithelium. This metaplastic change is a direct result of a deficiency in which vitamin?", options: ["A. Vitamin A", "B. Vitamin B12", "C. Vitamin C", "D. Vitamin D", "E. Vitamin K"], correctAnswer: 0, explanation: "เฉลย: A. Vitamin A\nคำอธิบาย: ภาวะเยื่อบุตาแห้ง (xerophthalmia) และการเปลี่ยนเซลล์ตาเป็นแบบ keratinizing squamous metaplasia เป็นผลโดยตรงจากการขาดวิตามินเอ" },
        { question: "34. A 45-year-old male is diagnosed with Polyarteritis Nodosa, a systemic vasculitis. A biopsy of a medium-sized artery shows intense eosinophilic destruction of the vessel wall accompanied by an inflammatory infiltrate. The necrotic area consists of leaked plasma proteins and immune complexes. This represents which specific type of necrosis?", options: ["A. Coagulative necrosis", "B. Caseous necrosis", "C. Fibrinoid necrosis", "D. Fat necrosis", "E. Liquefactive necrosis"], correctAnswer: 2, explanation: "เฉลย: C. Fibrinoid necrosis\nคำอธิบาย: การทำลายผนังหลอดเลือด (vasculitis) ร่วมกับการสะสมของโปรตีนพลาสมาและ immune complexes เป็นลักษณะของ Fibrinoid necrosis" },
        { question: "35. A 30-year-old female was involved in a motor vehicle accident, sustaining blunt trauma to her chest from the steering wheel. Several weeks later, she palpates a painless, firm lump in her left breast. A biopsy reveals anucleate adipocytes, calcifications, and lipid-laden macrophages. What is the most likely diagnosis?", options: ["A. Coagulative necrosis of breast tissue", "B. Traumatic fat necrosis", "C. Caseating granuloma", "D. Acute mastitis", "E. Breast carcinoma"], correctAnswer: 1, explanation: "เฉลย: B. Traumatic fat necrosis\nคำอธิบาย: ก้อนที่เต้านมหลังเกิดอุบัติเหตุ ร่วมกับภาพจุลทรรศน์ที่พบ adipocytes ไร้นิวเคลียสและ lipid-laden macrophages เป็นตัวแทนของ Traumatic fat necrosis" },
        { question: "36. A pathologist is examining a liver biopsy from a patient with acute viral hepatitis. Under the microscope, she identifies a single, isolated hepatocyte that is shrunken, with an intensely eosinophilic cytoplasm and a dense, fragmented nucleus. There is no inflammatory reaction surrounding this individual cell. Which process is taking place?", options: ["A. Apoptosis", "B. Autophagy", "C. Coagulative necrosis", "D. Liquefactive necrosis", "E. Metaplasia"], correctAnswer: 0, explanation: "เฉลย: A. Apoptosis\nคำอธิบาย: เซลล์เดี่ยวๆ ที่หดตัว นิวเคลียสแตก (fragmented) และไม่มีการอักเสบโดยรอบ เป็นรูปแบบการตายแบบ Apoptosis (ในตับมักเรียกว่า Councilman body)" },
        { question: "37. During normal cellular respiration and in periods of oxidative stress, superoxide free radicals are continuously generated within the mitochondria. Which of the following endogenous cellular enzymes is primarily responsible for converting this superoxide radical into hydrogen peroxide?", options: ["A. Catalase", "B. Glutathione peroxidase", "C. Superoxide dismutase (SOD)", "D. Myeloperoxidase", "E. NADPH oxidase"], correctAnswer: 2, explanation: "เฉลย: C. Superoxide dismutase (SOD)\nคำอธิบาย: เอนไซม์ Superoxide dismutase (SOD) มีหน้าที่เปลี่ยน superoxide radical ให้เป็น hydrogen peroxide (H2O2) ซึ่งจะถูกย่อยต่อโดย Catalase" },
        { question: "38. A 60-year-old male suffers prolonged ischemia to his large intestine. To determine if the intestinal epithelial cells have suffered irreversible injury, an electron microscopic analysis is performed. Which of the following ultrastructural findings is a definitive marker of irreversible cellular injury?", options: ["A. Detachment of ribosomes from the rough ER", "B. Mild mitochondrial swelling", "C. Plasma membrane blebbing", "D. Large, amorphous densities within the mitochondrial matrix", "E. Disaggregation of granular and fibrillar elements of the nucleolus"], correctAnswer: 3, explanation: "เฉลย: D. Large, amorphous densities within the mitochondrial matrix\nคำอธิบาย: การพบก้อน amorphous densities ขนาดใหญ่ในไมโทคอนเดรีย เป็นตัวบ่งชี้ชัดเจนว่าเซลล์บาดเจ็บในระยะที่ผันกลับไม่ได้ (Irreversible injury)" },
        { question: "39. A 50-year-old male with a long history of severe alcohol abuse undergoes a liver biopsy. Microscopic examination reveals characteristic irregular, eosinophilic cytoplasmic inclusions within the hepatocytes, known as Mallory-Denk bodies. These bodies are primarily composed of abnormally tangled aggregates of which cytoskeletal protein?", options: ["A. Actin microfilaments", "B. Cytokeratin intermediate filaments", "C. Tubulin microtubules", "D. Myosin thick filaments", "E. Vimentin"], correctAnswer: 1, explanation: "เฉลย: B. Cytokeratin intermediate filaments\nคำอธิบาย: Mallory-Denk bodies ในตับของคนดื่มสุรา เกิดจากการจับตัวกันของ Cytokeratin intermediate filaments" },
        { question: "40. A 35-year-old male presents with fatigue, dark urine, and yellowing of the sclerae (jaundice). Laboratory tests confirm severe hemolytic anemia. The yellow discoloration of his tissues is due to the systemic accumulation of which endogenous pigment?", options: ["A. Hemosiderin", "B. Melanin", "C. Lipofuscin", "D. Bilirubin", "E. Homogentisic acid"], correctAnswer: 3, explanation: "เฉลย: D. Bilirubin\nคำอธิบาย: อาการตัวเหลืองตาเหลือง (Jaundice) ในผู้ป่วยเม็ดเลือดแดงแตก (Hemolytic anemia) เกิดจากการสะสมของ Bilirubin ซึ่งเป็นผลผลิตจากการสลายฮีม" },
        { question: "41. A 60-year-old female with advanced multiple myeloma presents with bone pain and confusion. Her disease has caused extensive destruction of the bone matrix. An ultrasound of her kidneys reveals diffuse, bilateral calcifications within the renal parenchyma (nephrocalcinosis). This pathological finding is a classic example of:", options: ["A. Dystrophic calcification", "B. Metastatic calcification", "C. Systemic amyloidosis", "D. Heterotopic ossification", "E. Pathologic hyperplasia"], correctAnswer: 1, explanation: "เฉลย: B. Metastatic calcification\nคำอธิบาย: การทำลายกระดูกทำให้แคลเซียมในเลือดสูง (hypercalcemia) และไปสะสมที่เนื้อเยื่อปกติเช่น ไต ถือเป็นภาวะ Metastatic calcification" },
        { question: "42. A 70-year-old male with a history of severe atherosclerosis passes away from a myocardial infarction. At autopsy, his aorta is rigid and contains numerous hard, crunchy, white plaques. His medical records indicate that his serum calcium and phosphate levels were always within normal limits. The calcification in his aorta is due to:", options: ["A. Deposition of calcium into necrotic lipid plaques (Dystrophic calcification)", "B. Parathyroid adenoma causing hypercalcemia", "C. Excessive bone resorption", "D. Vitamin D toxicity", "E. Chronic renal failure"], correctAnswer: 0, explanation: "เฉลย: A. Deposition of calcium into necrotic lipid plaques (Dystrophic calcification)\nคำอธิบาย: การมีแคลเซียมสะสมในหลอดเลือดที่มีรอยโรคหลอดเลือดแข็งตัว (Atherosclerosis) โดยระดับแคลเซียมในเลือดปกติ เป็นลักษณะของ Dystrophic calcification" },
        { question: "43. Cellular senescence prevents normal somatic cells from dividing indefinitely. However, stem cells and many cancer cells can divide continuously without hitting this limit. They achieve this 'immortality' by expressing an enzyme that adds protective nucleotide repeats to the ends of their chromosomes. What is the name of this enzyme?", options: ["A. DNA polymerase", "B. Helicase", "C. Topoisomerase", "D. Telomerase", "E. Ligase"], correctAnswer: 3, explanation: "เฉลย: D. Telomerase\nคำอธิบาย: เอนไซม์ Telomerase จะเติมความยาวให้ส่วนปลายโครโมโซม (telomere) ช่วยให้ stem cells หรือเซลล์มะเร็งแบ่งตัวได้เรื่อยๆ โดยไม่เกิด cellular senescence" },
        { question: "44. A 40-year-old male is diagnosed with follicular lymphoma. Genetic analysis of the tumor cells reveals a t(14;18) translocation, leading to the massive overproduction of the Bcl-2 protein. How does the overexpression of Bcl-2 promote the survival of these cancer cells?", options: ["A. It directly activates executing caspases.", "B. It acts as a pro-apoptotic member of the Bax/Bak family.", "C. It prevents the release of cytochrome c from the mitochondria.", "D. It triggers the Fas death receptor pathway.", "E. It repairs severe DNA damage."], correctAnswer: 2, explanation: "เฉลย: C. It prevents the release of cytochrome c from the mitochondria.\nคำอธิบาย: Bcl-2 เป็นโปรตีนต้านการตาย (anti-apoptotic) ที่จะไปป้องกันไม่ให้ cytochrome c รั่วไหลออกจากไมโทคอนเดรีย ทำให้เซลล์ไม่เกิด Apoptosis" },
        { question: "45. A 2-year-old boy in a developing country is diagnosed with Kwashiorkor due to a diet severely deficient in protein but high in carbohydrates. He presents with a swollen abdomen and hepatomegaly. A liver biopsy shows extensive steatosis (fatty change). The primary mechanism for fat accumulation in his liver is:", options: ["A. Increased mobilization of free fatty acids from peripheral adipose tissue", "B. Decreased synthesis of apolipoproteins required for lipid export", "C. Increased peripheral conversion of glucose to triglycerides", "D. Direct free radical damage to the mitochondrial membrane", "E. Enzymatic saponification of hepatic fat"], correctAnswer: 1, explanation: "เฉลย: B. Decreased synthesis of apolipoproteins required for lipid export\nคำอธิบาย: ในภาวะขาดโปรตีน (Kwashiorkor) ตับจะไม่สามารถสร้าง Apolipoproteins ได้เพียงพอ ทำให้ไม่สามารถขนส่งไขมันออกจากตับได้ จึงเกิดไขมันพอกตับ" },
        { question: "46. A 20-year-old male receives a large, elaborate tattoo on his back. The tattoo artist injects insoluble ink pigments deep into the dermis. Decades later, the tattoo is still clearly visible because the pigment has been stably retained. Which resident cells in the dermis have phagocytosed the ink and hold it without initiating an ongoing inflammatory response?", options: ["A. Mast cells", "B. Epidermal basal cells", "C. Fibroblasts", "D. Macrophages", "E. Neutrophils"], correctAnswer: 3, explanation: "เฉลย: D. Macrophages\nคำอธิบาย: หมึกรอยสักจะถูกเซลล์เม็ดเลือดขาวชนิด Macrophages ในชั้นหนังแท้ (dermis) กลืนกิน (phagocytosis) และเก็บสารสีไว้ได้ตลอดชีวิต" },
        { question: "47. A 55-year-old male with chronic gastroesophageal reflux disease (GERD) undergoes an endoscopy, which reveals Barrett's esophagus. The transition from normal squamous epithelium to metaplastic columnar epithelium is fundamentally driven by which cellular mechanism?", options: ["A. Direct transdifferentiation of mature squamous cells into mature columnar cells", "B. Fusion of multiple squamous cells", "C. Reprogramming of local tissue stem cells by the acidic environment", "D. Infiltration of mature columnar cells from the stomach", "E. Uncontrolled neoplastic proliferation of mutated cells"], correctAnswer: 2, explanation: "เฉลย: C. Reprogramming of local tissue stem cells by the acidic environment\nคำอธิบาย: Metaplasia ใน Barrett's esophagus ไม่ใช่เซลล์เดิมเปลี่ยนสภาพ แต่เกิดจากการ Reprogramming ของ stem cell ในเนื้อเยื่อนั้นๆ ให้สร้างเซลล์ชนิดใหม่" },
        { question: "48. A 45-year-old female presents with abnormal uterine bleeding. An ultrasound shows a significantly thickened endometrial lining. Biopsy reveals an increased number of endometrial glands relative to the stroma. She is diagnosed with endometrial hyperplasia caused by unopposed estrogen stimulation. If left untreated, she is at increased risk for developing which of the following?", options: ["A. Endometrial atrophy", "B. Uterine fibroids (Leiomyomas)", "C. Endometrial adenocarcinoma", "D. Cervical dysplasia", "E. Endometriosis"], correctAnswer: 2, explanation: "เฉลย: C. Endometrial adenocarcinoma\nคำอธิบาย: Pathologic hyperplasia (เช่น เยื่อบุโพรงมดลูกหนาตัวจากฮอร์โมน) หากปล่อยทิ้งไว้จะเพิ่มความเสี่ยงในการกลายเป็นมะเร็ง (Endometrial adenocarcinoma)" },
        { question: "49. Cytotoxic T-lymphocytes (CD8+ cells) play a crucial role in eliminating virus-infected cells. Upon recognizing a target cell, they release perforin and granzymes. Granzymes enter the target cell and directly cleave and activate which family of enzymes to execute apoptosis?", options: ["A. Caspases", "B. Lipases", "C. Matrix metalloproteinases", "D. Endonucleases", "E. Cytochromes"], correctAnswer: 0, explanation: "เฉลย: A. Caspases\nคำอธิบาย: Granzymes ที่ปล่อยจาก CD8+ T-cell จะเข้าไปตัดและกระตุ้นเอนไซม์ Caspases โดยตรงเพื่อทำลายเซลล์เป้าหมายผ่านกระบวนการ Apoptosis" },
        { question: "50. A 75-year-old male with severe peripheral artery disease develops a completely occluded femoral artery. He presents with a cold, black, dry, and shriveled lower leg. There are no signs of a secondary bacterial infection. This classic clinical presentation of 'dry gangrene' is fundamentally a pattern of:", options: ["A. Extensive liquefactive necrosis", "B. Massive coagulative necrosis", "C. Fibrinoid necrosis", "D. Caseous necrosis", "E. Fat necrosis"], correctAnswer: 1, explanation: "เฉลย: B. Massive coagulative necrosis\nคำอธิบาย: Dry gangrene คือลักษณะเฉพาะของการขาดเลือดอย่างรุนแรงโดยไม่มีการติดเชื้อแทรกซ้อน ซึ่งกลไกพื้นฐานคือ Coagulative necrosis บริเวณกว้าง" }

    ];

    const chapter2Data = [
        { question: "1. A 30-year-old female experiences sudden lip swelling, hives, and wheezing 10 minutes after eating a meal containing peanuts. Which of the following preformed mediators, stored in tissue mast cells, is primarily responsible for this immediate vascular response?", options: ["A. Prostaglandin E2", "B. Histamine", "C. Interleukin-8", "D. Tumor Necrosis Factor (TNF)", "E. Complement C5a"], correctAnswer: 1, explanation: "เฉลย: B. Histamine\nคำอธิบาย: Histamine เป็น Preformed mediator ที่เก็บไว้ใน Mast cells เมื่อเกิดภูมิแพ้จะหลั่งออกมากระตุ้นหลอดเลือดให้ขยายตัวและสารน้ำซึมออกทันที" },
        { question: "2. A 40-year-old male is admitted with a high fever, productive cough, and shortness of breath. Chest X-ray reveals consolidation in the right lower lobe, consistent with lobar pneumonia. A sample of the alveolar exudate is examined. Which leukocyte is the first to arrive and is most predominant in this early acute inflammatory stage?", options: ["A. Eosinophil", "B. Macrophage", "C. Neutrophil", "D. Lymphocyte", "E. Plasma cell"], correctAnswer: 2, explanation: "เฉลย: C. Neutrophil\nคำอธิบาย: Neutrophil เป็นเซลล์เม็ดเลือดขาวชนิดแรกที่จะเดินทางไปถึงบริเวณที่มีการอักเสบเฉียบพลัน (Acute inflammation) โดยเฉพาะในช่วง 6-24 ชั่วโมงแรก" },
        { question: "3. A 5-year-old boy presents with recurrent pyogenic infections. Tests reveal a genetic deficiency in a key plasma protein that normally coats bacteria to facilitate their engulfment by macrophages and neutrophils. Which of the following complement components acts as this major opsonin?", options: ["A. C5a", "B. C3b", "C. C5b", "D. C3a", "E. C1q"], correctAnswer: 1, explanation: "เฉลย: B. C3b\nคำอธิบาย: C3b ทำหน้าที่เป็น Opsonin หลักในระบบ Complement โดยไปเคลือบผิวแบคทีเรีย ทำให้เม็ดเลือดขาวกลืนกิน (Phagocytosis) ได้ง่ายขึ้น" },
        { question: "4. A 65-year-old female in the ICU develops gram-negative septic shock. Blood tests reveal elevated circulating levels of extracellular fibrillar networks composed of chromatin and granule proteins (such as myeloperoxidase) that trap pathogens. What is the source of these extracellular traps?", options: ["A. Apoptotic macrophages", "B. Degranulating mast cells", "C. Dying neutrophils", "D. Activated platelets", "E. Endothelial cells"], correctAnswer: 2, explanation: "เฉลย: C. Dying neutrophils\nคำอธิบาย: โครงข่ายที่พ่นออกมาจับเชื้อโรคคือ NETs (Neutrophil Extracellular Traps) ซึ่งสร้างจากนิวเคลียสและโปรตีนของ Neutrophils ที่กำลังจะตาย" },
        { question: "5. A 45-year-old female with Systemic Lupus Erythematosus (SLE) complains of sharp, localized chest pain that worsens with deep breathing. An echocardiogram shows no pericardial effusion, but an autopsy of a similar patient would reveal a thick, pink, shaggy exudate on the pleural surface. This morphologic pattern is best described as:", options: ["A. Purulent inflammation", "B. Serous inflammation", "C. Catarrhal inflammation", "D. Fibrinous inflammation", "E. Granulomatous inflammation"], correctAnswer: 3, explanation: "เฉลย: D. Fibrinous inflammation\nคำอธิบาย: ลักษณะ Exudate ที่เป็นเส้นใยสีชมพูหนืด (shaggy) คล้ายขนมปังทาเนย มักพบที่เยื่อหุ้มปอดหรือเยื่อหุ้มหัวใจ เป็นลักษณะเฉพาะของ Fibrinous inflammation" },
        { question: "6. A 25-year-old male suffers a severe ankle sprain. Within an hour, the ankle is markedly swollen, red, and intensely painful. While prostaglandins sensitize the nerve endings, which of the following kinins is directly responsible for mediating the sensation of pain in this acute inflammatory response?", options: ["A. Serotonin", "B. Bradykinin", "C. Leukotriene C4", "D. Plasmin", "E. Nitric oxide"], correctAnswer: 1, explanation: "เฉลย: B. Bradykinin\nคำอธิบาย: Bradykinin เป็นสารในระบบ Kinin ที่มีหน้าที่หลักในการกระตุ้นปลายประสาททำให้เกิดความรู้สึกเจ็บปวด (Pain) และทำให้หลอดเลือดขยายตัว" },
        { question: "7. A 10-year-old girl develops a high fever during an episode of acute influenza. The fever is mediated by prostaglandins acting on the thermoregulatory center in the hypothalamus. Which cytokines are the principal circulating 'endogenous pyrogens' that trigger this process?", options: ["A. IL-2 and IFN-", "B. IL-10 and TGF-β", "C. IL-1 and TNF", "D. IL-4 and IL-5", "E. IL-8 and IL-17"], correctAnswer: 2, explanation: "เฉลย: C. IL-1 and TNF\nคำอธิบาย: IL-1 และ TNF เป็น Cytokines หลักที่ทำหน้าที่เป็น Endogenous pyrogens โดยจะไปกระตุ้นไฮโปทาลามัสให้สร้าง Prostaglandins ส่งผลให้เกิดไข้" },
        { question: "8. A 50-year-old male immigrant is diagnosed with pulmonary tuberculosis. Biopsy of a lung lesion reveals granulomas characterized by aggregates of epithelioid macrophages and multinucleated giant cells. Which cytokine, released by activated T cells (Th1), is essential for transforming monocytes into these epithelioid cells?", options: ["A. Interleukin-10", "B. Interferon- (IFN-)", "C. Interleukin-4", "D. Vascular Endothelial Growth Factor (VEGF)", "E. Bradykinin"], correctAnswer: 1, explanation: "เฉลย: B. Interferon- (IFN-)\nคำอธิบาย: IFN-gamma จาก Th1 cells เป็นตัวกระตุ้นหลักที่ทำให้ Macrophages เปลี่ยนรูปร่างไปเป็น Epithelioid cells เพื่อรวมตัวกันสร้าง Granuloma" },
        { question: "9. A 35-year-old male who is an intravenous drug user presents with shortness of breath. A lung biopsy reveals microscopic nodules composed of multinucleated giant cells surrounding highly refractile, crystalline material. There is an absence of caseous necrosis. This lesion is best classified as a:", options: ["A. Foreign body granuloma", "B. Immune-mediated granuloma", "C. Suppurative abscess", "D. Gumma", "E. Pseudomembrane"], correctAnswer: 0, explanation: "เฉลย: A. Foreign body granuloma\nคำอธิบาย: การพบเซลล์ยักษ์ล้อมรอบวัสดุที่สะท้อนแสงได้ (เช่น ผงแป้งในยาฉีด) โดยไม่มี Caseous necrosis เป็นลักษณะของ Granuloma ที่เกิดจากสิ่งแปลกปลอม (Foreign body)" },
        { question: "10. A 55-year-old female with long-standing rheumatoid arthritis is found to have a normocytic, normochromic anemia. Her serum ferritin is elevated, but total iron-binding capacity is low. The liver synthesizes an acute-phase reactant that traps iron in macrophages and blocks its absorption. What is this protein?", options: ["A. Transferrin", "B. C-reactive protein (CRP)", "C. Serum amyloid A (SAA)", "D. Hepcidin", "E. Fibrinogen"], correctAnswer: 3, explanation: "เฉลย: D. Hepcidin\nคำอธิบาย: Hepcidin ถูกสร้างเพิ่มขึ้นในช่วงที่มีการอักเสบเรื้อรัง ทำหน้าที่ยับยั้งการปล่อยธาตุเหล็กจาก Macrophage และยับยั้งการดูดซึมเหล็ก นำไปสู่ภาวะซีด (Anemia of chronic disease)" },
        { question: "11. A 40-year-old male with untreated syphilis develops a painless ulcer (chancre) on his genitalia. A biopsy of the lesion shows a dense chronic inflammatory infiltrate with numerous cells exhibiting an eccentric nucleus with a 'clock-face' chromatin pattern and a perinuclear halo. These cells are specialized to produce:", options: ["A. Reactive oxygen species", "B. Histamine", "C. Immunoglobulins", "D. Collagen", "E. Leukotrienes"], correctAnswer: 2, explanation: "เฉลย: C. Immunoglobulins\nคำอธิบาย: เซลล์ที่มีนิวเคลียสอยู่ริม (eccentric) และโครมาตินเรียงตัวคล้ายหน้าปัดนาฬิกา (clock-face) คือ Plasma cells ซึ่งทำหน้าที่สร้างแอนติบอดี (Immunoglobulins)" },
        { question: "12. A 60-year-old male with a history of daily NSAID use presents with epigastric pain. Endoscopy reveals a well-demarcated breach in the mucosa of the gastric antrum that extends into the submucosa. The base contains inflammatory exudate and granulation tissue. What is the correct term for this local defect?", options: ["A. Abscess", "B. Fistula", "C. Empyema", "D. Ulcer", "E. Erosion"], correctAnswer: 3, explanation: "เฉลย: D. Ulcer\nคำอธิบาย: รอยแผลที่ทะลุผ่านชั้น Mucosa ลึกลงไปถึงชั้น Submucosa เรียกว่า แผลเปื่อย (Ulcer) (ถ้าแค่ผิวๆ จะเรียกว่า Erosion)" },
        { question: "13. A 22-year-old woman spends hours at the beach without sunscreen. By evening, her skin is bright red (erythema) and warm to the touch. These cardinal signs of inflammation are predominantly due to vasodilation of the microcirculation. Which mediator is a potent endogenous vasodilator?", options: ["A. Thromboxane A2", "B. Leukotriene C4", "C. Nitric oxide", "D. C5a", "E. Platelet-activating factor (PAF)"], correctAnswer: 2, explanation: "เฉลย: C. Nitric oxide\nคำอธิบาย: Nitric oxide, Histamine และ Prostaglandins เป็นสารตัวกลางสำคัญที่ทำให้เกิดการขยายตัวของหลอดเลือด (Vasodilation) ส่งผลให้บริเวณที่อักเสบแดงและร้อน" },
        { question: "14. A 28-year-old male presents with a painful, fluctuant, red mass on his back. Incision of the lesion releases a large volume of thick, yellow-green, foul-smelling liquid. This fluid represents liquefactive necrosis and is characteristic of an infection by which class of microorganisms?", options: ["A. Mycobacteria", "B. Pyogenic bacteria", "C. Parasites", "D. Fungi", "E. Viruses"], correctAnswer: 1, explanation: "เฉลย: B. Pyogenic bacteria\nคำอธิบาย: ของเหลวหนืดสีเหลืองเขียวคือหนอง (Pus) ซึ่งเกิดจาก Liquefactive necrosis มักพบในการติดเชื้อแบคทีเรียกลุ่มสร้างหนอง (Pyogenic bacteria)" },
        { question: "15. A patient is recovering from a severe acute viral myocarditis. Over weeks, the inflammation subsides, and tissue repair begins. Which subpopulation of macrophages is primarily responsible for resolving the inflammation, clearing debris, and secreting TGF-β to promote fibrosis?", options: ["A. Classically activated macrophages (M1)", "B. Alternatively activated macrophages (M2)", "C. Kupffer cells", "D. Microglia", "E. Epithelioid macrophages"], correctAnswer: 1, explanation: "เฉลย: B. Alternatively activated macrophages (M2)\nคำอธิบาย: M2 Macrophages มีบทบาทสำคัญในการซ่อมแซมเนื้อเยื่อ (Tissue repair) ลดการอักเสบ และหลั่ง TGF-beta เพื่อกระตุ้นการสร้างเส้นเลือดและพังผืด" },
        { question: "16. A 15-year-old boy steps on a rusty nail. Within hours, neutrophils begin to accumulate at the site of endothelial injury. The initial step of leukocyte extravasation involves the leukocytes transiently binding and detaching from the endothelium, causing them to 'roll.' Which adhesion molecules mediate this rolling phase?", options: ["A. Integrins", "B. Cadherins", "C. Selectins", "D. Immunoglobulin superfamily (ICAM-1)", "E. CD31 (PECAM-1)"], correctAnswer: 2, explanation: "เฉลย: C. Selectins\nคำอธิบาย: กระบวนการเกาะหลวมๆ และกลิ้ง (Rolling) ของเม็ดเลือดขาว เกิดจากการจับกันของโมเลกุลในกลุ่ม Selectins" },
        { question: "17. During acute inflammation, after leukocytes roll along the endothelial surface, they undergo firm adhesion before transmigrating. This firm adhesion is mediated by the binding of leukocyte surface molecules to ICAM-1 and VCAM-1 on the endothelium. Which molecules on the leukocyte surface are responsible for this?", options: ["A. L-selectin", "B. Sialyl-Lewis X", "C. Integrins", "D. CD31", "E. Mucins"], correctAnswer: 2, explanation: "เฉลย: C. Integrins\nคำอธิบาย: การเกาะติดแน่น (Firm adhesion) กับผนังหลอดเลือด อาศัยโมเลกุลกลุ่ม Integrins บนผิวเม็ดเลือดขาวไปจับกับ ICAM-1/VCAM-1" },
        { question: "18. Once firmly attached to the endothelium, leukocytes squeeze between the endothelial cells to exit the blood vessel and enter the interstitial tissue. Which endothelial adhesion molecule is primarily involved in this transcellular migration (diapedesis)?", options: ["A. P-selectin", "B. PECAM-1 (CD31)", "C. Integrin", "D. Fibronectin", "E. Histamine receptor"], correctAnswer: 1, explanation: "เฉลย: B. PECAM-1 (CD31)\nคำอธิบาย: การแทรกตัวผ่านช่องว่างของเซลล์บุโพรงหลอดเลือด (Transmigration/Diapedesis) อาศัยโมเลกุล PECAM-1 (หรือ CD31)" },
        { question: "19. After exiting the blood vessel, neutrophils migrate toward the site of bacterial infection following a chemical gradient. Which of the following is a potent endogenous chemoattractant for neutrophils?", options: ["A. Interleukin-10", "B. Interleukin-8 (CXCL8)", "C. Bradykinin", "D. Prostacyclin (PGI2)", "E. Nitric oxide"], correctAnswer: 1, explanation: "เฉลย: B. Interleukin-8 (CXCL8)\nคำอธิบาย: IL-8 เป็น Chemokine ที่ทำหน้าที่ดึงดูด (Chemoattractant) เรียกเม็ดเลือดขาว Neutrophil ให้มุ่งหน้าไปยังจุดที่มีการอักเสบได้อย่างทรงพลัง" },
        { question: "20. A neutrophil successfully engulfs a bacterium into a phagolysosome. The most potent microbicidal mechanism involves the rapid generation of reactive oxygen species (the respiratory burst). Which enzyme is responsible for initiating this burst by converting oxygen to the superoxide anion?", options: ["A. Myeloperoxidase", "B. Superoxide dismutase", "C. Phagocyte oxidase (NADPH oxidase)", "D. Catalase", "E. Lysozyme"], correctAnswer: 2, explanation: "เฉลย: C. Phagocyte oxidase (NADPH oxidase)\nคำอธิบาย: เอนไซม์ NADPH oxidase ทำหน้าที่เปลี่ยนออกซิเจนให้เป็น Superoxide anion ซึ่งเป็นจุดเริ่มต้นของกระบวนการ Respiratory burst ในการทำลายแบคทีเรีย" },
        { question: "21. A 3-year-old boy has a history of recurrent infections with Staphylococcus aureus and Aspergillus. Tests show his neutrophils can phagocytose bacteria but cannot kill them efficiently due to a failure to produce hydrogen peroxide. This patient most likely suffers from:", options: ["A. Chédiak-Higashi syndrome", "B. Leukocyte adhesion deficiency", "C. Chronic granulomatous disease (CGD)", "D. Myeloperoxidase deficiency", "E. Severe combined immunodeficiency (SCID)"], correctAnswer: 2, explanation: "เฉลย: C. Chronic granulomatous disease (CGD)\nคำอธิบาย: CGD เกิดจากความบกพร่องของ NADPH oxidase ทำให้เม็ดเลือดขาวกินเชื้อได้แต่สร้าง ROS มาฆ่าเชื้อไม่ได้" },
        { question: "22. A 40-year-old asthmatic patient takes a high dose of aspirin for a headache. Shortly after, she experiences severe bronchospasm and shortness of breath. Aspirin inhibits the cyclooxygenase (COX) pathway. The resulting bronchospasm is due to the overproduction of metabolites from which alternative arachidonic acid pathway?", options: ["A. Lipoxygenase pathway (producing Leukotrienes)", "B. Phospholipase A2 pathway", "C. Nitric oxide synthase pathway", "D. Kinin cascade", "E. Complement alternate pathway"], correctAnswer: 0, explanation: "เฉลย: A. Lipoxygenase pathway (producing Leukotrienes)\nคำอธิบาย: ยา Aspirin ยับยั้ง COX pathway ทำให้สารตั้งต้นไหลไปเข้า Lipoxygenase pathway แทน ส่งผลให้เกิด Leukotrienes จำนวนมาก ซึ่งทำให้หลอดลมหดเกร็ง" },
        { question: "23. A 20-year-old hiker develops a large, tense blister on her heel after wearing tight boots. The blister is filled with a clear, watery, protein-poor fluid. This type of exudate represents which morphological pattern of acute inflammation?", options: ["A. Suppurative inflammation", "B. Fibrinous inflammation", "C. Serous inflammation", "D. Hemorrhagic inflammation", "E. Ulcerative inflammation"], correctAnswer: 2, explanation: "เฉลย: C. Serous inflammation\nคำอธิบาย: ตุ่มพองที่มีน้ำใส โปรตีนต่ำ (เช่น รองเท้ากัด, ไฟลวกตื้นๆ) เป็นลักษณะของการอักเสบแบบ Serous inflammation" },
        { question: "24. A 70-year-old female with polymyalgia rheumatica has an elevated Erythrocyte Sedimentation Rate (ESR). The ESR is elevated because red blood cells clump together (rouleaux formation) in the presence of high concentrations of a specific acute-phase protein synthesized by the liver. Which protein is this?", options: ["A. Albumin", "B. Fibrinogen", "C. Transferrin", "D. Complement C3", "E. alpha-1 antitrypsin"], correctAnswer: 1, explanation: "เฉลย: B. Fibrinogen\nคำอธิบาย: Fibrinogen ที่ตับสร้างเพิ่มขึ้นตอนอักเสบ จะทำให้เม็ดเลือดแดงเกาะกลุ่มกัน (Rouleaux) ทำให้จมเร็วขึ้นและส่งผลให้ค่า ESR สูงขึ้น" },
        { question: "25. A 30-year-old traveler returning from a tropical region is diagnosed with an intestinal parasitic infection (Ascaris lumbricoides). A complete blood count reveals marked leukocytosis. Which specific leukocyte would be prominently elevated in the peripheral blood to defend against this helminthic parasite?", options: ["A. Neutrophils", "B. Basophils", "C. Eosinophils", "D. Lymphocytes", "E. Monocytes"], correctAnswer: 2, explanation: "เฉลย: C. Eosinophils\nคำอธิบาย: Eosinophils เป็นเม็ดเลือดขาวที่มีหน้าที่หลักในการต่อสู้กับการติดเชื้อพยาธิ (Parasites/Helminths)" },
        { question: "26. To combat the parasitic infection mentioned in the previous question, the specialized leukocytes release a toxic cationic protein that is particularly effective against helminths but also causes host tissue damage. What is the name of this preformed granule protein?", options: ["A. Myeloperoxidase", "B. Major basic protein (MBP)", "C. Lysozyme", "D. Defensins", "E. Elastase"], correctAnswer: 1, explanation: "เฉลย: B. Major basic protein (MBP)\nคำอธิบาย: Major basic protein (MBP) เป็นโปรตีนในแกรนูลของ Eosinophils มีฤทธิ์เป็นพิษทำลายผนังเซลล์ของพยาธิได้ดี" },
        { question: "27. A 60-year-old male with acute appendicitis has a peripheral white blood cell count of 18,000 cells/µL. A blood smear shows an increased number of 'band cells' (immature neutrophils). This phenomenon, known as a 'shift to the left,' is driven by the accelerated release of cells from the bone marrow stimulated by:", options: ["A. Histamine and Serotonin", "B. TNF and IL-1", "C. Transforming Growth Factor-β (TGF-β)", "D. Reactive Oxygen Species", "E. Complement C5b-9"], correctAnswer: 1, explanation: "เฉลย: B. TNF and IL-1\nคำอธิบาย: Cytokines เช่น TNF และ IL-1 จะกระตุ้นไขกระดูกให้เร่งปล่อยเม็ดเลือดขาวตัวอ่อน (Band cells) ออกมาสู่กระแสเลือด เกิดภาวะ Shift to the left" },
        { question: "28. Chronic inflammation is distinguished from acute inflammation by several hallmark features. Which of the following triads correctly characterizes the histological picture of chronic inflammation?", options: ["A. Vasodilation, edema, and neutrophilic infiltrate", "B. Mononuclear cell infiltration, tissue destruction, and repair (fibrosis/angiogenesis)", "C. Fibrin deposition, abscess formation, and liquefactive necrosis", "D. Mast cell degranulation, eosinophilia, and histamine release", "E. Exudation of protein-poor fluid, blistering, and epithelial necrosis"], correctAnswer: 1, explanation: "เฉลย: B. Mononuclear cell infiltration, tissue destruction, and repair (fibrosis/angiogenesis)\nคำอธิบาย: 3 องค์ประกอบหลักของการอักเสบเรื้อรัง คือ 1.เซลล์ชนิด Mononuclear (เช่น Macrophages, Lymphocytes) 2.การทำลายเนื้อเยื่อ 3.การซ่อมแซม (พังผืด/หลอดเลือดใหม่)" },
        { question: "29. During chronic inflammation, macrophages accumulate in the damaged tissue and persist for long periods. What is the primary origin of these tissue macrophages in a chronic inflammatory lesion?", options: ["A. Proliferation of local fibroblasts", "B. Differentiation from circulating T-lymphocytes", "C. Recruitment of blood monocytes", "D. Transformation of endothelial cells", "E. Dedifferentiation of resident mast cells"], correctAnswer: 2, explanation: "เฉลย: C. Recruitment of blood monocytes\nคำอธิบาย: Macrophages ส่วนใหญ่ในบริเวณที่อักเสบเรื้อรัง มาจากการดึงดูด Monocytes จากในกระแสเลือดให้เคลื่อนที่เข้ามาในเนื้อเยื่อ" },
        { question: "30. A 55-year-old patient with inflammatory bowel disease undergoes a colonoscopy. Biopsies reveal granulomas in the submucosa. Granulomas are fundamentally composed of activated macrophages that have undergone morphological changes to look like epithelial cells. What is the specific term for these modified macrophages?", options: ["A. Histiocytes", "B. Langhans giant cells", "C. Foreign body giant cells", "D. Epithelioid cells", "E. Dendritic cells"], correctAnswer: 3, explanation: "เฉลย: D. Epithelioid cells\nคำอธิบาย: Macrophages ที่ถูกกระตุ้นจนแบนกว้าง คล้ายเซลล์เยื่อบุผิว (Epithelial-like) ในก้อน Granuloma เรียกว่า Epithelioid cells" },
        { question: "31. A 1-month-old male infant presents with a severe bacterial skin infection but lacks any pus formation at the site. His umbilical cord separation was delayed. A genetic test reveals a defect in the CD18 subunit of β2-integrins. This defect primarily impairs which critical step of the acute inflammatory response?", options: ["A. Release of histamine from mast cells", "B. Firm adhesion of leukocytes to the endothelium", "C. Initial rolling of leukocytes on selectins", "D. Phagolysosome formation", "E. Recognition of opsonized bacteria"], correctAnswer: 1, explanation: "เฉลย: B. Firm adhesion of leukocytes to the endothelium\nคำอธิบาย: โรค LAD type 1 เกิดจากความผิดปกติของ CD18 (ส่วนประกอบของ Integrins) ทำให้เม็ดเลือดขาวไม่สามารถเกาะติดแน่นกับหลอดเลือด (Firm adhesion) เพื่อออกไปสร้างหนองได้" },
        { question: "32. Within minutes of a minor thermal burn, local endothelial cells undergo activation, leading to the rapid appearance of P-selectin on their luminal surface to facilitate leukocyte rolling. Where is this preformed P-selectin stored inside the unactivated endothelial cells?", options: ["A. Weibel-Palade bodies", "B. Lysosomes", "C. Rough endoplasmic reticulum", "D. Mitochondria", "E. Golgi apparatus"], correctAnswer: 0, explanation: "เฉลย: A. Weibel-Palade bodies\nคำอธิบาย: P-selectin ถูกสร้างเตรียมไว้ล่วงหน้าและเก็บไว้ใน Weibel-Palade bodies ของเซลล์บุโพรงหลอดเลือด พร้อมนำมาใช้ทันทีที่ถูกกระตุ้น" },
        { question: "33. A 4-year-old boy presents with partial albinism, peripheral neuropathy, and recurrent staphylococcal infections. A peripheral blood smear demonstrates giant granules within his neutrophils. He is diagnosed with Chédiak-Higashi syndrome. The fundamental cellular defect in this disease is an abnormality in:", options: ["A. NADPH oxidase assembly", "B. Microtubule polymerization and phagolysosome fusion", "C. Synthesis of integrin molecules", "D. Complement C3 activation", "E. T-cell receptor rearrangement"], correctAnswer: 1, explanation: "เฉลย: B. Microtubule polymerization and phagolysosome fusion\nคำอธิบาย: Chédiak-Higashi syndrome เกิดจากความบกพร่องในการขนส่งและเชื่อมรวมถุง Lysosome เข้าด้วยกัน ทำให้เกิดแกรนูลขนาดใหญ่ยักษ์และทำงานไม่ได้" },
        { question: "34. As an acute inflammatory response progresses towards resolution, the lipid mediator profile switches from pro-inflammatory prostaglandins and leukotrienes to active anti-inflammatory mediators. Which of the following arachidonic acid metabolites directly promotes the resolution of inflammation by inhibiting neutrophil recruitment?", options: ["A. Thromboxane A2", "B. Prostacyclin (PGI2)", "C. Lipoxins", "D. Leukotriene C4", "E. Platelet-activating factor (PAF)"], correctAnswer: 2, explanation: "เฉลย: C. Lipoxins\nคำอธิบาย: Lipoxins เป็นสารกลุ่มไขมันที่มีฤทธิ์ 'ต้านการอักเสบ' โดยจะยับยั้งไม่ให้ Neutrophil เข้ามาเพิ่ม เพื่อเข้าสู่ระยะฟื้นฟูแผล" },
        { question: "35. Macrophages exhibit marked plasticity and can be activated into different phenotypes. While Th1 cytokines like IFN-γ promote classical activation (M1) for microbial killing, which cytokine, primarily secreted by Th2 cells, suppresses the M1 phenotype and promotes alternative macrophage activation (M2) for tissue repair?", options: ["A. Interleukin-1 (IL-1)", "B. Tumor Necrosis Factor (TNF)", "C. Interleukin-4 (IL-4)", "D. Interleukin-6 (IL-6)", "E. Interleukin-8 (IL-8)"], correctAnswer: 2, explanation: "เฉลย: C. Interleukin-4 (IL-4)\nคำอธิบาย: IL-4 จาก Th2 cells เป็นตัวเหนี่ยวนำให้ Macrophages เข้าสู่รูปแบบ M2 ซึ่งเน้นการซ่อมแซมเนื้อเยื่อ (Tissue repair) และลดการอักเสบ" },
        { question: "36. Phagocytosis is highly efficient when microbes are coated with specific opsonins. In addition to the complement component C3b, which of the following is a major specific opsonin that binds to microbes and is recognized by Fc receptors on phagocytes?", options: ["A. IgA", "B. IgG", "C. IgM", "D. C-reactive protein (CRP)", "E. Fibrinogen"], correctAnswer: 1, explanation: "เฉลย: B. IgG\nคำอธิบาย: IgG เป็นแอนติบอดีที่มีประสิทธิภาพสูงมากในการทำหน้าที่เป็น Opsonin โดยส่วนหาง (Fc portion) จะไปจับกับ Fc receptor บนผิวเซลล์เม็ดเลือดขาว" },
        { question: "37. A 60-year-old male presents with excruciating pain and swelling in his first metatarsophalangeal joint (podagra). Joint fluid analysis shows needle-shaped monosodium urate crystals. These crystals trigger inflammation by activating a cytosolic multiprotein complex that subsequently activates Caspase-1 to cleave and release active IL-1β. What is the name of this multiprotein complex?", options: ["A. MAC (Membrane Attack Complex)", "B. T-cell Receptor Complex", "C. Inflammasome", "D. Proteasome", "E. Spliceosome"], correctAnswer: 2, explanation: "เฉลย: C. Inflammasome\nคำอธิบาย: ผลึกยูเรต (โรคเกาต์) จะกระตุ้นคอมเพล็กซ์ภายในเซลล์ที่เรียกว่า Inflammasome ให้กระตุ้น Caspase-1 และหลั่งสารอักเสบ IL-1beta อย่างรุนแรง" },
        { question: "38. A 25-year-old carpenter punctures his hand with a dirty nail. Two days later, the wound is infected, and he notices painful, red streaks extending up his forearm toward his axilla. These red streaks are classically indicative of which secondary consequence of localized acute inflammation?", options: ["A. Deep vein thrombosis", "B. Lymphangitis", "C. Septicemia", "D. Arteritis", "E. Subcutaneous emphysema"], correctAnswer: 1, explanation: "เฉลย: B. Lymphangitis\nคำอธิบาย: เส้นสีแดงยาวตามผิวหนัง (Red streaks) แสดงถึงการอักเสบที่ลามไปตามท่อน้ำเหลือง เรียกว่า Lymphangitis" },
        { question: "39. During a severe bacterial infection, the complement cascade is extensively activated. Certain cleavage fragments of complement proteins act directly on mast cells, causing them to degranulate and release histamine independent of IgE cross-linking. Which of the following are known as these 'anaphylatoxins'?", options: ["A. C1q and C2", "B. C3a and C5a", "C. C3b and C4b", "D. C5b and C6", "E. C7, C8, and C9"], correctAnswer: 1, explanation: "เฉลย: B. C3a and C5a\nคำอธิบาย: C3a และ C5a เรียกว่า Anaphylatoxins เพราะสามารถกระตุ้น Mast cells ให้หลั่ง Histamine ได้โดยตรง ทำให้เกิดอาการคล้ายภูมิแพ้รุนแรง" },
        { question: "40. A 30-year-old African American female presents with a dry cough and shortness of breath. Chest X-ray reveals bilateral hilar lymphadenopathy. A transbronchial lung biopsy demonstrates numerous well-formed granulomas composed of epithelioid cells and giant cells, with a complete absence of central necrosis. What is the most likely diagnosis?", options: ["A. Tuberculosis", "B. Syphilis", "C. Sarcoidosis", "D. Histoplasmosis", "E. Foreign body reaction"], correctAnswer: 2, explanation: "เฉลย: C. Sarcoidosis\nคำอธิบาย: Granuloma แบบที่ไม่มีเนื้อตายตรงกลาง (Non-caseating) ร่วมกับต่อมน้ำเหลืองที่ขั้วปอดโต เป็นอาการคลาสสิกของโรค Sarcoidosis" },
        { question: "41. A 2-year-old boy is suspected of having Chronic Granulomatous Disease (CGD). Which laboratory test is most appropriate to confirm the diagnosis by assessing the functional capability of his neutrophils to produce reactive oxygen species?", options: ["A. Erythrocyte Sedimentation Rate (ESR)", "B. Nitroblue tetrazolium (NBT) reduction test", "C. Complete Blood Count (CBC) with differential", "D. Flow cytometry for CD18", "E. Serum immunoglobulin levels"], correctAnswer: 1, explanation: "เฉลย: B. Nitroblue tetrazolium (NBT) reduction test\nคำอธิบาย: NBT test ใช้ทดสอบการทำงานของ Neutrophil ในการสร้างสารอนุมูลอิสระ (ROS) ซึ่งผู้ป่วยโรค CGD จะมีผลทดสอบเป็นลบ (ไม่เปลี่ยนสี)" },
        { question: "42. In systemic inflammatory response syndrome (SIRS) or septic shock triggered by severe bacterial infections, high levels of a specific cytokine cause widespread vasodilation, systemic edema, depressed myocardial contractility, and disseminated intravascular coagulation (DIC). Which cytokine is the principal mediator of these catastrophic systemic effects?", options: ["A. Interleukin-2 (IL-2)", "B. Tumor Necrosis Factor (TNF)", "C. Transforming Growth Factor-β (TGF-β)", "D. Interleukin-10 (IL-10)", "E. Interferon-γ (IFN-γ)"], correctAnswer: 1, explanation: "เฉลย: B. Tumor Necrosis Factor (TNF)\nคำอธิบาย: TNF เป็น Cytokine ตัวหลัก (Master regulator) ที่เมื่อมีระดับสูงมากในเลือดจะทำให้เกิดภาวะช็อก (Septic shock) และลิ่มเลือดอุดตันทั่วร่างกาย" },
        { question: "43. C-reactive protein (CRP) is widely used in clinical practice as a blood marker for systemic inflammation. It is synthesized by the liver in response to IL-6. What is the primary biological function of CRP during the inflammatory response?", options: ["A. Inhibits the cyclooxygenase (COX) enzyme", "B. Induces smooth muscle cell proliferation", "C. Acts as an opsonin and activates the complement system", "D. Scavenges reactive oxygen species", "E. Stimulates red blood cell production"], correctAnswer: 2, explanation: "เฉลย: C. Acts as an opsonin and activates the complement system\nคำอธิบาย: นอกจากการเป็นตัวบ่งชี้การอักเสบ CRP ยังมีหน้าที่จับกับแบคทีเรีย ทำตัวเป็น Opsonin และกระตุ้นระบบ Complement ด้วย" },
        { question: "44. A 20-year-old female with known pollen allergies is exposed to a high pollen count. She develops allergic rhinitis. At the cellular level, the immediate release of histamine and other preformed mediators from her nasal mast cells is directly triggered by the cross-linking of which surface receptor?", options: ["A. Toll-like receptor 4 (TLR4)", "B. CD40", "C. High-affinity IgE receptor (FcεRI)", "D. Histamine H1 receptor", "E. T-cell receptor (TCR)"], correctAnswer: 2, explanation: "เฉลย: C. High-affinity IgE receptor (FcεRI)\nคำอธิบาย: ภูมิแพ้แบบฉับพลันเกิดจากการที่สารก่อภูมิแพ้ไปจับกับแอนติบอดี IgE ที่เกาะอยู่บนตัวรับ FcεRI บนผิวเซลล์ Mast cell ทำให้หลั่งสาร Histamine" },
        { question: "45. A 55-year-old male is prescribed an Angiotensin-Converting Enzyme (ACE) inhibitor for hypertension. Two weeks later, he develops a persistent dry cough and mild lip swelling (angioedema). These side effects occur because ACE not only converts Angiotensin I to II but also normally degrades which pro-inflammatory mediator?", options: ["A. Serotonin", "B. Bradykinin", "C. Leukotriene B4", "D. Prostaglandin E2", "E. Complement C3a"], correctAnswer: 1, explanation: "เฉลย: B. Bradykinin\nคำอธิบาย: เอนไซม์ ACE ปกติจะย่อยสลาย Bradykinin การกินยา ACE inhibitor จึงทำให้ Bradykinin คั่งค้าง ส่งผลให้เกิดอาการไอแห้งและปากบวม" },
        { question: "46. A patient with a severe flare-up of rheumatoid arthritis is treated with high-dose systemic corticosteroids (e.g., prednisone). Corticosteroids act as potent anti-inflammatory agents primarily by upregulating annexin-1 (lipocortin), which directly inhibits which upstream enzyme in the generation of lipid mediators?", options: ["A. Cyclooxygenase-1 (COX-1)", "B. Cyclooxygenase-2 (COX-2)", "C. 5-Lipoxygenase", "D. Phospholipase A2", "E. Thromboxane synthase"], correctAnswer: 3, explanation: "เฉลย: D. Phospholipase A2\nคำอธิบาย: สเตียรอยด์ (Corticosteroids) จะสร้างโปรตีน Lipocortin ไปยับยั้งเอนไซม์ Phospholipase A2 ซึ่งเป็นเอนไซม์ต้นทางสุดในการสร้างสารอักเสบกลุ่ม Eicosanoids ทุกชนิด" },
        { question: "47. In chronic inflammation, the persistent accumulation of macrophages in the tissue is critical. While local proliferation plays a role, the major mechanism maintaining this large macrophage population is the continuous recruitment of monocytes from the circulation. Which specific chemokine is primarily responsible for attracting these monocytes to the site of injury?", options: ["A. CXCL8 (IL-8)", "B. CCL2 (MCP-1)", "C. CXCL10 (IP-10)", "D. CCL11 (Eotaxin)", "E. Fractalkine"], correctAnswer: 1, explanation: "เฉลย: B. CCL2 (MCP-1)\nคำอธิบาย: CCL2 หรือ Monocyte Chemoattractant Protein-1 (MCP-1) เป็น Chemokine หลักที่ทำหน้าที่ดึงดูด Monocyte เข้ามาในเนื้อเยื่อ" },
        { question: "48. A 12-year-old boy with a history of severe allergic asthma is found to have eosinophil-rich infiltrates in his bronchial mucosa. The selective recruitment of eosinophils from the blood into the airway tissues is strongly dependent on which specific chemokine?", options: ["A. Interleukin-8 (IL-8)", "B. Monocyte Chemoattractant Protein-1 (MCP-1)", "C. Eotaxin", "D. Interferon-γ (IFN-γ)", "E. Bradykinin"], correctAnswer: 2, explanation: "เฉลย: C. Eotaxin\nคำอธิบาย: Eotaxin เป็น Chemokine ที่มีความจำเพาะเจาะจงสูงในการดึงดูด Eosinophils ให้เข้ามายังบริเวณที่มีการแพ้ เช่น หลอดลมในโรคหอบหืด" },
        { question: "49. A medical student is reviewing histological slides of inflamed tissues. She struggles to distinguish between 'granulation tissue' and a 'granuloma.' Which of the following fundamental cellular compositions correctly differentiates a granuloma from granulation tissue?", options: ["A. A granuloma consists of proliferating blood vessels and fibroblasts.", "B. A granuloma consists of an aggregate of epithelioid macrophages.", "C. A granuloma is a collection of neutrophils and liquefied debris.", "D. A granuloma is primarily composed of infiltrating plasma cells and lymphocytes.", "E. A granuloma is characterized by extensive deposition of dense Type I collagen."], correctAnswer: 1, explanation: "เฉลย: B. A granuloma consists of an aggregate of epithelioid macrophages.\nคำอธิบาย: Granuloma คือ 'กลุ่มก้อนของ Macrophage ที่เปลี่ยนรูปไป (Epithelioid cells)' ส่วน Granulation tissue คือ 'เนื้อเยื่อซ่อมแซม' ที่มีหลอดเลือดและ Fibroblasts" },
        { question: "50. A 40-year-old male presents with severe lobar pneumonia. His peripheral white blood cell count is 55,000 cells/µL (predominantly mature and immature neutrophils), mimicking leukemia. This extreme elevation of leukocytes in response to infection is known as a leukemoid reaction. Which laboratory test result would help confirm this is a reactive inflammatory response rather than Chronic Myeloid Leukemia (CML)?", options: ["A. Presence of the Philadelphia chromosome (t(9;22))", "B. Decreased Leukocyte Alkaline Phosphatase (LAP) score", "C. Elevated Leukocyte Alkaline Phosphatase (LAP) score", "D. Presence of Auer rods in the neutrophils", "E. Monoclonal expansion of B lymphocytes"], correctAnswer: 2, explanation: "เฉลย: C. Elevated Leukocyte Alkaline Phosphatase (LAP) score\nคำอธิบาย: Leukemoid reaction (การสร้างเม็ดเลือดขาวจำนวนมหาศาลเพื่อสู้การติดเชื้อ) เม็ดเลือดขาวจะทำงานได้จริง ทำให้ค่า LAP score สูง ต่างจากมะเร็ง CML ที่เซลล์ผิดปกติทำให้ค่า LAP score ต่ำ" }

    // ==========================================
