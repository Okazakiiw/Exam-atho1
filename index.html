    const chapter3Data = [
        { question: "1. A 45-year-old male donates a portion of his liver for transplantation. Within weeks, his remaining liver tissue grows back to nearly its original size to compensate for the loss. Based on their proliferative capacity, hepatocytes belong to which of the following tissue categories?", options: ["A. Labile tissue", "B. Stable tissue", "C. Permanent tissue", "D. Pluripotent stem cells", "E. Terminally differentiated tissue"], correctAnswer: 1, explanation: "เฉลย: B. Stable tissue\nคำอธิบาย: เซลล์ตับ (Hepatocytes) จัดอยู่ในกลุ่ม Stable tissue ซึ่งปกติจะพักอยู่ในระยะ G0 (ไม่แบ่งตัว) แต่สามารถกลับเข้าสู่วงจรเซลล์เพื่อแบ่งตัวซ่อมแซมได้ทันทีเมื่อได้รับบาดเจ็บหรือถูกตัดออกไป" },
        { question: "2. A patient receives high-dose chemotherapy, which severely depresses bone marrow function and causes sloughing of the gastrointestinal mucosa. The rapid death of these cells occurs because they are constantly dividing to replace shed or aging cells. These tissues are classified as:", options: ["A. Stable tissues", "B. Quiescent tissues", "C. Permanent tissues", "D. Labile tissues", "E. Mesenchymal tissues"], correctAnswer: 3, explanation: "เฉลย: D. Labile tissues\nคำอธิบาย: เนื้อเยื่อไขกระดูกและเยื่อบุทางเดินอาหารมีการแบ่งตัวทดแทนเซลล์เก่าอยู่ตลอดเวลาอย่างต่อเนื่อง จึงจัดอยู่ในกลุ่ม Labile tissue ซึ่งมักจะได้รับผลกระทบจากยาเคมีบำบัดรุนแรงที่สุด" },
        { question: "3. A 60-year-old male sustains a myocardial infarction. Because cardiac myocytes cannot adequately proliferate, the necrotic tissue is ultimately replaced by a scar. The primary resident cells that proliferate and secrete extracellular matrix to form this scar are:", options: ["A. Astrocytes", "B. Endothelial cells", "C. Fibroblasts", "D. Macrophages", "E. Chondrocytes"], correctAnswer: 2, explanation: "เฉลย: C. Fibroblasts\nคำอธิบาย: กล้ามเนื้อหัวใจเป็น Permanent tissue ไม่สามารถแบ่งตัวได้ เมื่อตายจากภาวะขาดเลือดจะถูกซ่อมแซมด้วยการสร้างแผลเป็น (Scar) โดยมี Fibroblasts เป็นเซลล์หลักที่ทำหน้าที่สร้างและหลั่งคอลลาเจน (Extracellular matrix)" },
        { question: "4. Three days after sustaining a deep cut on his hand, a 25-year-old male notices the wound bed is pink, soft, and granular. This 'granulation tissue' is primarily characterized by the proliferation of fibroblasts and which other key biological process?", options: ["A. Dense collagen bundle formation", "B. Angiogenesis (neovascularization)", "C. Liquefactive necrosis", "D. Epithelioid cell aggregation", "E. Calcification"], correctAnswer: 1, explanation: "เฉลย: B. Angiogenesis (neovascularization)\nคำอธิบาย: Granulation tissue (เนื้อเยื่อแกรนนูเลชัน) มีลักษณะสีชมพู อ่อนนุ่ม ประกอบด้วยองค์ประกอบหลัก 2 อย่างคือ การเพิ่มจำนวนของ Fibroblasts และการสร้างหลอดเลือดใหม่ (Angiogenesis) เพื่อนำสารอาหารมาหล่อเลี้ยงแผล" },
        { question: "5. A 55-year-old female with chronic viral hepatitis develops liver cirrhosis. The excessive deposition of collagen in the liver interstitium leads to loss of function. Which of the following cytokines is the most potent stimulator of collagen synthesis by fibroblasts in this fibrotic process?", options: ["A. Tumor Necrosis Factor (TNF)", "B. Interleukin-6 (IL-6)", "C. Transforming Growth Factor-β (TGF-β)", "D. Vascular Endothelial Growth Factor (VEGF)", "E. Interferon- (IFN-)"], correctAnswer: 2, explanation: "เฉลย: C. Transforming Growth Factor-β (TGF-β)\nคำอธิบาย: TGF-beta เป็น Cytokine ที่มีบทบาทสำคัญและมีฤทธิ์กระตุ้นการสร้างคอลลาเจนและกระบวนการเกิดพังผืด (Fibrosis) ที่ทรงพลังที่สุดในร่างกาย" },
        { question: "6. A 30-year-old male suffers extensive third-degree burns on his back. The wound is left to heal without skin grafting. Over several weeks, the overall size of the wound defect significantly decreases as the edges are physically pulled together. Which cells are directly responsible for this mechanical reduction in wound size?", options: ["A. Smooth muscle cells", "B. Epidermal stem cells", "C. Myofibroblasts", "D. Macrophages", "E. Endothelial cells"], correctAnswer: 2, explanation: "เฉลย: C. Myofibroblasts\nคำอธิบาย: การที่ขนาดของบาดแผลหดเล็กลง (Wound contraction) เกิดจากการทำงานของ Myofibroblasts ซึ่งเป็นเซลล์ Fibroblasts ที่เปลี่ยนสภาพให้มีโปรตีนหดตัวคล้ายกล้ามเนื้อ ทำหน้าที่ดึงรั้งขอบแผลเข้าหากัน" },
        { question: "7. A surgeon performs a laparoscopic cholecystectomy, making small, clean incisions that are immediately closed with sutures. This type of wound healing, characterized by minimal tissue loss and a narrow scar, is known as:", options: ["A. Healing by secondary intention", "B. Exuberant granulation", "C. Healing by primary intention (First intention)", "D. Compensatory hyperplasia", "E. Fibromatosis"], correctAnswer: 2, explanation: "เฉลย: C. Healing by primary intention (First intention)\nคำอธิบาย: แผลผ่าตัดที่สะอาด ขอบแผลเรียบ และถูกเย็บปิดประกบกันทันที (ทำให้มีการสูญเสียเนื้อเยื่อน้อยมาก) จัดเป็นการหายของแผลแบบ Primary intention" },
        { question: "8. A 40-year-old construction worker sustains a severe crush injury to his calf with extensive tissue avulsion. The wound is heavily contaminated and cannot be surgically closed, so it is left open to heal over time. Compared to a clean surgical incision, this wound will exhibit a much larger amount of:", options: ["A. Intact basement membrane", "B. Granulation tissue", "C. Original adnexal structures (hair follicles)", "D. Eosinophilic infiltrate", "E. Caseous necrosis"], correctAnswer: 1, explanation: "เฉลย: B. Granulation tissue\nคำอธิบาย: แผลเปิดขนาดใหญ่หรือแผลติดเชื้อที่ไม่สามารถเย็บปิดได้ จะหายแบบ Secondary intention ซึ่งร่างกายจะต้องสร้าง Granulation tissue ปริมาณมากเพื่อมาเติมเต็มช่องว่างที่ขาดหายไป" },
        { question: "9. A 20-year-old athlete undergoes ACL reconstruction surgery. A month later, she asks her doctor when her knee ligament will be fully healed and back to normal strength. Assuming optimal healing, the doctor informs her that the maximal tensile strength of a mature scar usually plateaus at what percentage of unwounded normal tissue?", options: ["A. 10%", "B. 30%", "C. 50%", "D. 70-80%", "E. 100%"], correctAnswer: 3, explanation: "เฉลย: D. 70-80%\nคำอธิบาย: ความแข็งแรงของแผลเป็น (Tensile strength) แม้จะผ่านไปหลายเดือนจนแผลโตเต็มที่แล้ว ก็จะกลับคืนมาได้สูงสุดเพียงประมาณ 70-80% ของความแข็งแรงเนื้อเยื่อปกติเท่านั้น" },
        { question: "10. A 50-year-old male has his skin sutures removed 7 days after an uncomplicated abdominal surgery. At this precise moment, the tensile strength of the healing wound is largely dependent on the newly formed collagen. What is the approximate tensile strength of the wound at 1 week compared to normal skin?", options: ["A. 10%", "B. 25%", "C. 50%", "D. 75%", "E. 100%"], correctAnswer: 0, explanation: "เฉลย: A. 10%\nคำอธิบาย: ในช่วง 1 สัปดาห์แรก (ระยะเวลาที่มักจะทำการตัดไหม) ความแข็งแรงของบาดแผลยังมีเพียงประมาณ 10% ของผิวหนังปกติ จึงต้องระมัดระวังไม่ให้แผลปริแตก" },
        { question: "11. During the early stages of wound healing (around day 3-5), the extracellular matrix is primarily composed of a specific type of collagen that is somewhat delicate and disorganized. As the scar matures, this is replaced by a stronger type of collagen. The early, delicate collagen is:", options: ["A. Type I collagen", "B. Type II collagen", "C. Type III collagen", "D. Type IV collagen", "E. Elastin"], correctAnswer: 2, explanation: "เฉลย: C. Type III collagen\nคำอธิบาย: ในช่วงแรกของการสร้างเนื้อเยื่อแกรนนูเลชัน คอลลาเจนที่ถูกสร้างขึ้นมาเป็นโครงข่ายคือ Type III ซึ่งมีความยืดหยุ่นแต่บอบบาง หลังจากนั้นจะค่อยๆ ถูกแทนที่ด้วย Type I ที่แข็งแรงกว่า" },
        { question: "12. The structural remodeling of a scar involves the continuous synthesis and degradation of collagen and other extracellular matrix proteins. Which family of zinc-dependent enzymes is primarily responsible for degrading the ECM during tissue remodeling?", options: ["A. Lipoxygenases", "B. Cyclooxygenases", "C. Matrix Metalloproteinases (MMPs)", "D. Serine proteases", "E. Acid hydrolases"], correctAnswer: 2, explanation: "เฉลย: C. Matrix Metalloproteinases (MMPs)\nคำอธิบาย: MMPs เป็นเอนไซม์สำคัญที่ทำหน้าที่ย่อยสลายองค์ประกอบของ ECM (รวมถึงคอลลาเจนเก่า) เพื่อจัดเรียงโครงสร้างของแผลใหม่ (Remodeling) โดยเอนไซม์กลุ่มนี้ต้องใช้สังกะสี (Zinc) เป็นโคแฟกเตอร์" },
        { question: "13. A 28-year-old African American female has a history of severe scarring. Three years after undergoing open-heart surgery, she has a massive, prominent, irregularly shaped scar on her chest that extends well beyond the boundaries of the original sternal incision. This lesion is composed of thick, glassy collagen bundles. What is the correct diagnosis?", options: ["A. Desmoid tumor", "B. Hypertrophic scar", "C. Granuloma", "D. Keloid", "E. Proud flesh"], correctAnswer: 3, explanation: "เฉลย: D. Keloid\nคำอธิบาย: คีลอยด์ (Keloid) คือแผลเป็นที่นูนหนาและลุกลามออก 'นอกขอบเขต' ของบาดแผลเดิม มักพบในคนผิวดำ เกิดจากการสร้างคอลลาเจนที่มากเกินปกติและไม่ยอมหยุดยั้ง" },
        { question: "14. A 10-year-old boy spills boiling water on his forearm, sustaining a deep partial-thickness burn. Six months later, the scar is raised, red, and firm, but it remains strictly confined to the area of the original burn. His dermatologist advises that it will likely regress over the next few years. This lesion represents a:", options: ["A. Keloid", "B. Hypertrophic scar", "C. Squamous cell carcinoma", "D. Contracture", "E. Exuberant granulation"], correctAnswer: 1, explanation: "เฉลย: B. Hypertrophic scar\nคำอธิบาย: Hypertrophic scar คือแผลเป็นนูนที่ยังคงอยู่ 'ในขอบเขต' ของบาดแผลเดิม (ไม่ลามออกไปเหมือนคีลอยด์) และมีแนวโน้มที่จะค่อยๆ ยุบลงได้เองเมื่อเวลาผ่านไปหลายปี" },
        { question: "15. A patient on a prolonged, severely restricted diet develops bleeding gums and poor wound healing. A biopsy of a recent wound shows a lack of structural integrity in the newly synthesized collagen. The defect is likely due to impaired cross-linking of collagen, a process that requires hydroxylation of proline and lysine residues. Which vitamin is the essential cofactor for this process?", options: ["A. Vitamin A", "B. Vitamin B12", "C. Vitamin C", "D. Vitamin D", "E. Vitamin K"], correctAnswer: 2, explanation: "เฉลย: C. Vitamin C\nคำอธิบาย: ผู้ป่วยมีอาการของโรคลักปิดลักเปิด (Scurvy) จากการขาดวิตามินซี ซึ่งวิตามินซีเป็นโคแฟกเตอร์ที่จำเป็นมากในกระบวนการ Hydroxylation ของ Proline และ Lysine เพื่อสร้างสายคอลลาเจนให้แข็งแรง" },
        { question: "16. A 60-year-old male with severe rheumatoid arthritis is treated with high daily doses of systemic glucocorticoids (prednisone). He requires surgery for a hernia repair. Which of the following effects of glucocorticoids is most likely to impair his wound healing?", options: ["A. Stimulation of excessive myofibroblast contraction", "B. Increased synthesis of matrix metalloproteinases", "C. Inhibition of TGF-β production and diminished fibrosis", "D. Hyperactivation of classically activated (M1) macrophages", "E. Excessive cross-linking of Type I collagen"], correctAnswer: 2, explanation: "เฉลย: C. Inhibition of TGF-β production and diminished fibrosis\nคำอธิบาย: สเตียรอยด์ (Glucocorticoids) ทำให้แผลหายช้าเนื่องจากมีฤทธิ์กดภูมิคุ้มกัน ลดการอักเสบ และที่สำคัญคือ 'ยับยั้งการสร้าง TGF-beta' ทำให้ Fibroblast สร้างคอลลาเจน (Fibrosis) ได้น้อยลงแผลจึงไม่สมาน" },
        { question: "17. A 35-year-old diabetic female undergoes a minor surgical procedure. Five days later, the wound margins are red, swollen, and separating, with a yellowish purulent discharge. What is the most common local factor that delays wound healing in clinical practice?", options: ["A. Presence of foreign bodies", "B. Early mechanical stress", "C. Localized tissue hypoxia", "D. Secondary bacterial infection", "E. Venous stasis"], correctAnswer: 3, explanation: "เฉลย: D. Secondary bacterial infection\nคำอธิบาย: สาเหตุเฉพาะที่ (Local factor) ที่พบได้บ่อยที่สุดในทางคลินิกที่ทำให้แผลหายช้าและเกิดภาวะแทรกซ้อนคือ 'การติดเชื้อแบคทีเรียซ้ำซ้อน' (Secondary bacterial infection) ที่บาดแผล" },
        { question: "18. An 80-year-old male with long-standing, poorly controlled type 2 diabetes presents with a non-healing ulcer on his great toe. The pathogenesis of this ulcer involves a combination of factors. Which systemic factor caused by his disease is primarily responsible for the compromised delivery of oxygen and nutrients to the wound bed?", options: ["A. Peripheral neuropathy", "B. Severe macrovascular and microvascular atherosclerosis", "C. Autoimmune destruction of endothelial cells", "D. Vitamin C deficiency", "E. Secondary fungal infection"], correctAnswer: 1, explanation: "เฉลย: B. Severe macrovascular and microvascular atherosclerosis\nคำอธิบาย: ปัจจัยเชิงระบบ (Systemic factor) ในผู้ป่วยเบาหวานที่ทำให้แผลหายช้าที่สุดคือ ภาวะหลอดเลือดแข็งตัวและตีบแคบ (Atherosclerosis) ทำให้เลือดนำออกซิเจนและสารอาหารไปเลี้ยงแผลได้ไม่เพียงพอ (Ischemia)" },
        { question: "19. A 40-year-old male sustains a deep laceration that is left to heal by secondary intention. Weeks later, the wound closure is halted by the formation of a protruding, fleshy, highly vascular mass of tissue that blocks the migrating epidermis from covering the defect. The surgeon must cauterize or excise this tissue to allow epithelialization. What is this mass called?", options: ["A. Granuloma", "B. Keloid", "C. Exuberant granulation (Proud flesh)", "D. Pyogenic granuloma", "E. Desmoid tumor"], correctAnswer: 2, explanation: "เฉลย: C. Exuberant granulation (Proud flesh)\nคำอธิบาย: Exuberant granulation (หรือ Proud flesh) คือเนื้อเยื่อแกรนนูเลชันที่งอกล้นขึ้นมาเหนือขอบแผล ทำให้เซลล์เยื่อบุผิว (Epidermis) ไม่สามารถเคลื่อนที่มาคลุมปิดแผลได้ ต้องทำการตัดหรือจี้ออก" },
        { question: "20. A 75-year-old bedridden patient in a nursing home develops a deep ulceration on her sacrum and heels. She is unable to reposition herself. These lesions, known as pressure sores or decubitus ulcers, are fundamentally caused by:", options: ["A. Chemical injury from urine and feces", "B. Primary bacterial invasion of the skin", "C. Mechanical compression of blood vessels leading to local ischemia", "D. Denervation atrophy of the underlying muscle", "E. Excessive friction causing epidermal stripping"], correctAnswer: 2, explanation: "เฉลย: C. Mechanical compression of blood vessels leading to local ischemia\nคำอธิบาย: แผลกดทับ (Pressure sores) เกิดจากการที่น้ำหนักตัวกดทับหลอดเลือดบริเวณผิวหนังที่ติดกับกระดูกเป็นเวลานาน ทำให้เนื้อเยื่อบริเวณนั้นขาดเลือด (Ischemia) และตายกลายเป็นแผลลึก" },
        { question: "21. Angiogenesis is critical for the development of granulation tissue. During the sprouting of new blood vessels from existing ones, which structural change must occur first to allow the endothelial cells to migrate into the surrounding tissue?", options: ["A. Apoptosis of pericytes", "B. Enzymatic degradation of the capillary basement membrane", "C. Deposition of dense Type I collagen", "D. Formation of tight junctions between endothelial cells", "E. Transformation of endothelial cells into fibroblasts"], correctAnswer: 1, explanation: "เฉลย: B. Enzymatic degradation of the capillary basement membrane\nคำอธิบาย: ขั้นตอนแรกสุดของการสร้างหลอดเลือดใหม่ (Angiogenesis) คือการหลั่งเอนไซม์ไปย่อยสลาย Basement membrane ของหลอดเลือดเดิม เพื่อเปิดทางให้เซลล์บุโพรงหลอดเลือด (Endothelial cells) สามารถแทรกตัวงอกออกไปได้" },
        { question: "22. True regeneration of a tissue requires the presence of stem cells. When a stem cell divides, it can produce one cell that retains its stem cell identity and another cell that goes on to differentiate into a mature cell. This key property of stem cells is termed:", options: ["A. Pluripotency", "B. Contact inhibition", "C. Asymmetric division", "D. Metaplasia", "E. Apoptosis"], correctAnswer: 2, explanation: "เฉลย: C. Asymmetric division\nคำอธิบาย: Asymmetric division คือคุณสมบัติเฉพาะของ Stem cell ที่เมื่อแบ่งตัวแล้ว เซลล์หนึ่งจะยังคงรักษาความเป็น Stem cell เอาไว้ (Self-renewal) ส่วนอีกเซลล์จะเปลี่ยนแปลงไปทำหน้าที่เฉพาะ (Differentiation)" },
        { question: "23. When a large portion of the liver is surgically removed, the remaining liver tissue grows to restore the lost mass. This process is primarily driven by:", options: ["A. Differentiation of circulating bone marrow stem cells", "B. Hyperplasia of the surviving mature hepatocytes", "C. Dedifferentiation of biliary epithelial cells", "D. Hypertrophy of the remaining liver capsule", "E. Massive proliferation of Kupffer cells"], correctAnswer: 1, explanation: "เฉลย: B. Hyperplasia of the surviving mature hepatocytes\nคำอธิบาย: ตับสามารถงอกใหม่ (Regeneration) ได้จากกระบวนการ Compensatory hyperplasia โดยเซลล์ตับ (Hepatocytes) ที่สมบูรณ์ซึ่งเหลืออยู่จะถูกกระตุ้นให้เข้าสู่วงจรเซลล์และแบ่งตัวเพิ่มจำนวนเพื่อชดเชยเนื้อตับที่หายไป" },
        { question: "24. A severe bacterial abscess in the kidney completely destroys the renal tubular epithelium along with its underlying extracellular matrix (ECM) framework. Even if the infection is successfully cleared, true regeneration of the tubules cannot occur. The primary reason for this failure to regenerate is:", options: ["A. The kidney is composed of permanent tissue.", "B. Renal tubular cells lack functional DNA polymerase.", "C. The destruction of the ECM scaffolding prevents organized cellular regrowth.", "D. High levels of local oxygen free radicals inhibit mitosis.", "E. Macrophages fail to phagocytose the necrotic debris."], correctAnswer: 2, explanation: "เฉลย: C. The destruction of the ECM scaffolding prevents organized cellular regrowth.\nคำอธิบาย: การงอกใหม่ของเนื้อเยื่อ (Regeneration) อย่างสมบูรณ์จำเป็นต้องอาศัยโครงร่าง ECM (Basement membrane) เดิมเป็นนั่งร้าน หาก ECM ถูกทำลายไป เซลล์จะไม่สามารถจัดเรียงตัวให้กลับมาทำงานตามปกติได้ และจะจบลงที่การสร้างแผลเป็น" },
        { question: "25. During wound healing, fibroblasts and other cells must migrate into the provisional matrix and adhere to extracellular matrix proteins like fibronectin and laminin. Which family of transmembrane receptors is crucial for mediating this cell-to-ECM adhesion?", options: ["A. Selectins", "B. Cadherins", "C. Integrins", "D. Toll-like receptors", "E. T-cell receptors"], correctAnswer: 2, explanation: "เฉลย: C. Integrins\nคำอธิบาย: Integrins เป็นโปรตีนตัวรับบนผิวเซลล์ ทำหน้าที่เชื่อมต่อโครงร่างภายในเซลล์ (Cytoskeleton) เข้ากับโปรตีนใน ECM (เช่น Fibronectin และ Laminin) ช่วยให้เซลล์สามารถยึดเกาะและเคลื่อนที่ในบาดแผลได้" },
        { question: "26. In a standard, uninfected surgical incision, which cell type peaks in the tissue around day 2 to 3, and is essential for clearing necrotic debris, promoting angiogenesis, and secreting cytokines that stimulate fibroblast proliferation?", options: ["A. Neutrophils", "B. Macrophages", "C. Lymphocytes", "D. Plasma cells", "E. Eosinophils"], correctAnswer: 1, explanation: "เฉลย: B. Macrophages\nคำอธิบาย: ในวันที่ 2-3 ของการเกิดแผล Macrophages จะเข้ามาแทนที่ Neutrophils โดยทำหน้าที่สำคัญคือเก็บกินเศษเซลล์ตาย และหลั่ง Growth factors/Cytokines เพื่อกระตุ้นกระบวนการซ่อมแซมแผลแบบบูรณาการ" },
        { question: "27. A 22-year-old male survives a house fire with severe deep burns across his anterior elbow joint. As the wound heals over several months, the excessive contraction of the scar tissue severely limits his ability to extend his arm. This functional impairment is a complication known as:", options: ["A. Wound dehiscence", "B. Ulceration", "C. Contracture", "D. Stricture", "E. Eventration"], correctAnswer: 2, explanation: "เฉลย: C. Contracture\nคำอธิบาย: Contracture คือภาวะแผลเป็นหดรั้งมากเกินไป มักพบบ่อยในแผลไฟไหม้น้ำร้อนลวก โดยเฉพาะบริเวณข้อต่อ ทำให้สูญเสียระยะการเคลื่อนไหวและทำงานได้ไม่เต็มที่" },
        { question: "28. A 35-year-old female notices a firm, painless mass in her abdominal wall surgical scar, one year after a cesarean section. Biopsy reveals a proliferation of benign-appearing fibroblasts heavily interspersed with collagen. The mass is locally invasive into surrounding muscle but does not metastasize. This lesion is a fibromatosis, clinically referred to as a:", options: ["A. Keloid", "B. Desmoid tumor", "C. Hypertrophic scar", "D. Fibrosarcoma", "E. Granuloma"], correctAnswer: 1, explanation: "เฉลย: B. Desmoid tumor\nคำอธิบาย: Desmoid tumor (จัดอยู่ในกลุ่ม Fibromatosis) เป็นเนื้องอกของ Fibroblasts ชนิดที่รุกรานลึกเข้าไปในกล้ามเนื้อเฉพาะที่ (Locally invasive) แต่ไม่แพร่กระจายไปยังอวัยวะอื่น มักพบก้อนแฝงตามรอยแผลผ่าตัดเก่า" },
        { question: "29. In a clean surgical wound approximated by sutures (healing by first intention), epithelial cells from the basal layer of the epidermis begin to migrate and meet across the wound. Approximately how long does it take for a continuous, thin epithelial layer to bridge the wound surface?", options: ["A. 1 to 2 hours", "B. 24 to 48 hours", "C. 5 to 7 days", "D. 14 days", "E. 1 month"], correctAnswer: 1, explanation: "เฉลย: B. 24 to 48 hours\nคำอธิบาย: ในการหายแบบ Primary intention ที่แผลถูกเย็บชิดติดกัน เซลล์บุผิว (Epithelial cells) จะใช้เวลาเพียง 24-48 ชั่วโมง ในการงอกและเคลื่อนที่มาบรรจบกันคลุมปิดพื้นผิวรอยแยกของแผลได้หมด" },
        { question: "30. A 70-year-old male suffers an ischemic stroke, causing liquefactive necrosis of a portion of his cerebral cortex. Months later, the necrotic debris is cleared, leaving a cystic cavity. The walls of this cavity are formed by a process analogous to scarring, but instead of collagen produced by fibroblasts, the 'scar' is formed by the proliferation of:", options: ["A. Microglia", "B. Oligodendrocytes", "C. Astrocytes (Gliosis)", "D. Ependymal cells", "E. Schwann cells"], correctAnswer: 2, explanation: "เฉลย: C. Astrocytes (Gliosis)\nคำอธิบาย: ในระบบประสาทส่วนกลาง (สมองและไขสันหลัง) กระบวนการซ่อมแซมแผลเนื้อตายจะไม่ใช้ Fibroblast มาสร้างคอลลาเจน แต่จะใช้ Astrocytes มาเพิ่มจำนวนและสร้างโครงข่ายล้อมรอบแผลแทน เรียกกระบวนการนี้ว่า Gliosis" },
        { question: "31. A 55-year-old male with chronic Hepatitis C infection undergoes a liver biopsy. The biopsy reveals extensive bridging fibrosis and early cirrhosis. In the pathogenesis of hepatic fibrosis, which specific resident cell type located in the space of Disse becomes activated, loses its lipid droplets, and transforms into a collagen-secreting myofibroblast?", options: ["A. Kupffer cell", "B. Hepatocyte", "C. Endothelial cell", "D. Hepatic stellate cell (Ito cell)", "E. Cholangiocyte"], correctAnswer: 3, explanation: "เฉลย: D. Hepatic stellate cell (Ito cell)\nคำอธิบาย: Hepatic stellate cells (Ito cells) ปกติทำหน้าที่เก็บสะสมวิตามินเอ (Lipid droplets) แต่เมื่อมีการอักเสบเรื้อรังในตับ มันจะถูกกระตุ้นให้เปลี่ยนร่างเป็น Myofibroblasts เพื่อหลั่งคอลลาเจนจำนวนมาก ทำให้เกิดภาวะตับแข็ง (Cirrhosis)" },
        { question: "32. During the proliferative phase of wound healing, new blood vessels sprout from existing ones to supply the growing tissue. Which of the following growth factors is widely considered the most critical and potent driver of endothelial cell proliferation, migration, and capillary sprouting during this angiogenesis process?", options: ["A. Platelet-Derived Growth Factor (PDGF)", "B. Vascular Endothelial Growth Factor A (VEGF-A)", "C. Epidermal Growth Factor (EGF)", "D. Interleukin-1 (IL-1)", "E. Transforming Growth Factor-β (TGF-β)"], correctAnswer: 1, explanation: "เฉลย: B. Vascular Endothelial Growth Factor A (VEGF-A)\nคำอธิบาย: VEGF-A เป็น Growth factor สารพัดประโยชน์ที่สำคัญที่สุดและมีประสิทธิภาพมากที่สุดในการกระตุ้นการแบ่งตัวและดึงดูดเซลล์หลอดเลือดให้งอกขึ้นมาใหม่ (Angiogenesis)" },
        { question: "33. A 65-year-old obese male undergoes emergency abdominal surgery for a ruptured appendix. Seven days post-operation, he experiences a severe bout of coughing, followed by a sudden tearing sensation in his abdomen. Examination reveals that the surgical wound has completely split open. This mechanical failure of wound healing is clinically termed:", options: ["A. Herniation", "B. Eventration", "C. Wound dehiscence", "D. Contracture", "E. Keloid formation"], correctAnswer: 2, explanation: "เฉลย: C. Wound dehiscence\nคำอธิบาย: Wound dehiscence คือภาวะแผลปริแตกแยกออกจากกัน มักเกิดจากการเพิ่มความดันในช่องท้อง (เช่น ไอ อาเจียน) ในผู้ป่วยกลุ่มเสี่ยง (เช่น อ้วน หรือแผลติดเชื้อ) ขณะที่แผลยังไม่ประสานกันแข็งแรงพอ" },
        { question: "34. A patient sustains a deep cutaneous wound. At approximately one week into the healing process, the wound bed is filled with granulation tissue. The extracellular matrix (ECM) of this newly forming tissue is highly hydrated to facilitate rapid cell migration. Which glycosaminoglycan is primarily responsible for providing this water-rich, gel-like environment in the early provisional matrix?", options: ["A. Chondroitin sulfate", "B. Heparan sulfate", "C. Hyaluronic acid", "D. Keratan sulfate", "E. Dermatan sulfate"], correctAnswer: 2, explanation: "เฉลย: C. Hyaluronic acid\nคำอธิบาย: Hyaluronic acid เป็นองค์ประกอบในกลุ่ม GAGs ที่มีคุณสมบัติอุ้มน้ำได้ดีมาก ทำให้ ECM ในช่วงแรกมีลักษณะเป็นเจลลื่นๆ (Hydrated gel) ช่วยอำนวยความสะดวกให้เซลล์ซ่อมแซมแผลเคลื่อนที่เข้ามาได้ง่าย" },
        { question: "35. For angiogenesis to begin, endothelial cells must degrade the surrounding basement membrane to migrate out into the extracellular space. This degradation is mediated by Matrix Metalloproteinases (MMPs). For optimal catalytic function, the active site of these MMP enzymes strictly requires which of the following metal ions?", options: ["A. Iron (Fe2+)", "B. Magnesium (Mg2+)", "C. Calcium (Ca2+)", "D. Zinc (Zn2+)", "E. Copper (Cu2+)"], correctAnswer: 3, explanation: "เฉลย: D. Zinc (Zn2+)\nคำอธิบาย: เอนไซม์ Matrix Metalloproteinases (MMPs) ตามชื่อ 'Metallo' หมายถึงโลหะ ซึ่งไอออนโลหะที่จำเป็นต้องใช้อยู่ใน Active site เพื่อเร่งปฏิกิริยาย่อยสลาย ECM ก็คือ สังกะสี (Zinc)" },
        { question: "36. A 15-year-old boy suffers a displaced fracture of his tibia. Two weeks after the injury and immobilization, an X-ray shows early signs of healing. At this intermediate stage, the tissue bridging the fractured bone ends primarily consists of a mix of proliferating fibroblasts, chondroblasts, and woven bone. This temporary structure is known as:", options: ["A. Hematoma", "B. Soft tissue callus (Procallus)", "C. Bony callus", "D. Lamellar bone", "E. Sequestrum"], correctAnswer: 1, explanation: "เฉลย: B. Soft tissue callus (Procallus)\nคำอธิบาย: Soft tissue callus (หรือ Procallus) คือโครงสร้างชั่วคราวในช่วง 1-2 สัปดาห์แรกของกระดูกหัก ประกอบด้วยพังผืด (Fibroblasts) และกระดูกอ่อน (Chondroblasts) เพื่อช่วยยึดกระดูกไว้หลวมๆ ก่อนจะเปลี่ยนเป็นกระดูกแข็งต่อไป" },
        { question: "37. The intestinal mucosal epithelium is subjected to constant mechanical and chemical stress and is completely renewed every few days. This rapid renewal is driven by a population of multipotent adult stem cells. Where are these stem cells specifically located within the small intestine?", options: ["A. Tips of the intestinal villi", "B. Lamina propria", "C. Submucosal nerve plexus", "D. Near the base of the crypts of Lieberkühn", "E. Muscularis externa"], correctAnswer: 3, explanation: "เฉลย: D. Near the base of the crypts of Lieberkühn\nคำอธิบาย: Stem cells ของเยื่อบุลำไส้เล็กจะซ่อนตัวอยู่บริเวณส่วนล่างสุดของร่องลึกที่เรียกว่า Crypts of Lieberkühn เพื่อความปลอดภัย และจะแบ่งตัวดันเซลล์ใหม่ขึ้นไปสู่ยอด Villi อย่างต่อเนื่อง" },
        { question: "38. Following a partial hepatectomy, the remaining hepatocytes enter the cell cycle to restore liver mass. Before growth factors like HGF and TGF-α can induce proliferation, the hepatocytes must be 'primed.' Which two cytokines, primarily produced by local Kupffer cells, are responsible for this essential priming phase?", options: ["A. IL-4 and IL-13", "B. IL-6 and TNF", "C. IFN- and IL-2", "D. TGF-β and IL-10", "E. VEGF and FGF"], correctAnswer: 1, explanation: "เฉลย: B. IL-6 and TNF\nคำอธิบาย: ก่อนที่ Growth factors จะสั่งให้เซลล์ตับแบ่งตัวได้ セลล์ตับจะต้องถูกปลุก (Priming) จากระยะ G0 ให้เข้าสู่วงจรเซลล์เสียก่อน โดยอาศัย Cytokines คือ IL-6 และ TNF ที่หลั่งมาจาก Kupffer cells" },
        { question: "39. A 28-year-old female sustains partial-thickness (second-degree) burns over her forearms. Despite the loss of the epidermis and superficial dermis, the skin is able to completely regenerate its epithelial layer without grafting. This robust regenerative capacity relies heavily on epithelial stem cells residing in which specific protected structure?", options: ["A. Sebaceous gland acini", "B. Eccrine sweat gland ducts", "C. Bulge region of the hair follicles", "D. Meissner's corpuscles", "E. Arrector pili muscles"], correctAnswer: 2, explanation: "เฉลย: C. Bulge region of the hair follicles\nคำอธิบาย: ในแผลไฟไหม้ระดับสอง (ผิวหนังชั้นนอกและหนังแท้ส่วนบนถูกทำลาย) เซลล์บุผิวจะสามารถงอกกลับมาใหม่ได้เพราะมี Skin stem cells รอดชีวิตซ่อนตัวอยู่ในส่วนกระเปาะ (Bulge region) ของรากขน" },
        { question: "40. A 5-year-old child accidentally ingests a caustic alkaline drain cleaner, causing severe chemical burns to his esophagus. Months later, he develops severe difficulty swallowing (dysphagia) due to significant narrowing of the esophageal lumen. This pathological stricture is primarily an exaggeration of which normal phase of wound healing?", options: ["A. Angiogenesis", "B. Hemostasis", "C. Epithelialization", "D. Wound contraction", "E. Acute inflammation"], correctAnswer: 3, explanation: "เฉลย: D. Wound contraction\nคำอธิบาย: การตีบแคบ (Stricture) ของหลอดอาหาร เป็นภาวะแทรกซ้อนที่เกิดจากการที่กลไก Wound contraction (การหดรัดตัวของแผลโดย Myofibroblast) ทำงานมากเกินไปในอวัยวะที่เป็นท่อ" },
        { question: "41. A 50-year-old diabetic patient has a poorly vascularized, chronic foot ulcer. The local tissue hypoxia acts as a major stimulus for initiating angiogenesis. Hypoxia achieves this by preventing the degradation of a specific intracellular transcription factor, allowing it to translocate to the nucleus and significantly upregulate the expression of VEGF. Which transcription factor is this?", options: ["A. NF-κB", "B. p53", "C. Hypoxia-Inducible Factor 1α (HIF-1α)", "D. STAT3", "E. c-Myc"], correctAnswer: 2, explanation: "เฉลย: C. Hypoxia-Inducible Factor 1α (HIF-1α)\nคำอธิบาย: เมื่อเนื้อเยื่อขาดออกซิเจน (Hypoxia) โปรตีน HIF-1α จะไม่ถูกสลายทิ้ง มันจึงเดินทางเข้าสู่นิวเคลียสเพื่อเปิดสวิตช์ยีนกระตุ้นการสร้างหลอดเลือดใหม่ (เช่น สั่งให้สร้าง VEGF)" },
        { question: "42. A patient with severe, prolonged malnutrition exhibits profoundly delayed wound healing. A biopsy of a healing wound reveals collagen fibers that are structurally weak due to a failure in the final cross-linking process. This cross-linking is catalyzed by the enzyme lysyl oxidase. Which trace element is an essential cofactor for lysyl oxidase activity?", options: ["A. Iron", "B. Zinc", "C. Selenium", "D. Copper", "E. Iodine"], correctAnswer: 3, explanation: "เฉลย: D. Copper\nคำอธิบาย: เอนไซม์ Lysyl oxidase ทำหน้าที่เชื่อมสายคอลลาเจนเข้าด้วยกัน (Cross-linking) เพื่อให้เส้นใยแข็งแรง ซึ่งเอนไซม์นี้จำเป็นต้องใช้แร่ธาตุทองแดง (Copper) เป็นโคแฟกเตอร์" },
        { question: "43. In a healing cutaneous wound, basal cells at the wound edge proliferate and migrate across the wound bed. Once the migrating epithelial sheets from opposite sides meet in the middle, they stop migrating and begin to stratify. What is the fundamental biological mechanism that signals these cells to halt their migration?", options: ["A. Apoptosis induction", "B. Telomere exhaustion", "C. Contact inhibition", "D. Hypoxia", "E. Nutrient depletion"], correctAnswer: 2, explanation: "เฉลย: C. Contact inhibition\nคำอธิบาย: Contact inhibition คือกลไกทางชีววิทยาที่สั่งให้เซลล์บุผิว (Epithelial cells) หยุดการเคลื่อนที่และหยุดแบ่งตัว เมื่อมันเจริญลามมาชนหรือสัมผัสกับเซลล์ข้างเคียง เพื่อป้องกันไม่ให้แผลหนาเกินไป" },
        { question: "44. During the formation of the provisional matrix in early wound healing, a specific glycoprotein plays a crucial dual role: it provides a structural scaffold for organizing the new matrix and serves as a major attachment site for migrating fibroblasts and endothelial cells via their integrin receptors. What is this vital glycoprotein?", options: ["A. Fibrillin", "B. Elastin", "C. Fibronectin", "D. Cadherin", "E. Osteopontin"], correctAnswer: 2, explanation: "เฉลย: C. Fibronectin\nคำอธิบาย: Fibronectin เป็นไกลโคโปรตีนหลักใน ECM ชั่วคราว ทำหน้าที่เสมือนเป็นนั่งร้านและมีจุดเกาะเฉพาะ เพื่อให้เซลล์ต่างๆ สามารถใช้ตัวรับ Integrins จับเกาะและดึงตัวเองเคลื่อนที่เข้ามาในแผลได้" },
        { question: "45. Many of the growth factors critical for tissue repair, such as Epidermal Growth Factor (EGF) and Platelet-Derived Growth Factor (PDGF), initiate intracellular signaling cascades by binding to specific cell surface receptors. To which major class of receptors do these typically belong?", options: ["A. G-protein coupled receptors", "B. Receptors with intrinsic Tyrosine Kinase activity", "C. Intracellular steroid receptors", "D. Ligand-gated ion channels", "E. Toll-like receptors"], correctAnswer: 1, explanation: "เฉลย: B. Receptors with intrinsic Tyrosine Kinase activity\nคำอธิบาย: ตัวรับของ Growth factors สำคัญๆ หลายชนิด (เช่น EGF, PDGF, FGF) มักเป็นตัวรับที่มีการทำงานของเอนไซม์ Tyrosine Kinase ในตัว (Receptor Tyrosine Kinases - RTKs) เพื่อกระตุ้นการส่งสัญญาณเข้าสู่นิวเคลียส" },
        { question: "46. Keloids represent an abnormal, excessive fibrotic response to injury, frequently extending beyond the original wound margins. Current understanding of keloid pathogenesis points to a localized overproduction of, and heightened cellular sensitivity to, which specific pro-fibrotic signaling molecule?", options: ["A. Vascular Endothelial Growth Factor (VEGF)", "B. Tumor Necrosis Factor (TNF)", "C. Nitric Oxide (NO)", "D. Transforming Growth Factor-β (TGF-β)", "E. Interleukin-8 (IL-8)"], correctAnswer: 3, explanation: "เฉลย: D. Transforming Growth Factor-β (TGF-β)\nคำอธิบาย: คีลอยด์ (Keloids) เกิดจากความผิดปกติที่มีการสร้างและตอบสนองต่อ TGF-β ซึ่งเป็นสารกระตุ้นการสร้างพังผืด (Pro-fibrotic) ที่รุนแรงเกินกว่าเหตุ ทำให้ผลิตคอลลาเจนไม่หยุด" },
        { question: "47. During the resolution phase of inflammation and the onset of tissue repair, macrophages transition from a pro-inflammatory (M1) state to an alternatively activated (M2) phenotype. Which cytokines, typically secreted by Th2 lymphocytes, are the primary signals that induce this critical M2 polarization?", options: ["A. IFN- and TNF", "B. IL-1 and IL-6", "C. IL-4 and IL-13", "D. IL-12 and IL-18", "E. IL-8 and Eotaxin"], correctAnswer: 2, explanation: "เฉลย: C. IL-4 and IL-13\nคำอธิบาย: IL-4 และ IL-13 (ที่สร้างมาจากเซลล์ Th2) เป็น Cytokines สำคัญที่รับหน้าที่กระตุ้นและเปลี่ยน Macrophages ให้เป็นรูปแบบ M2 ซึ่งจะทำหน้าที่ซ่อมแซมและยุติการอักเสบ" },
        { question: "48. A 30-year-old carpenter severs a digital nerve in his index finger with a saw. For sensation to eventually return, the distal portion of the cut axon must degenerate (Wallerian degeneration), and the proximal stump must grow new sprouts. Which cells are absolutely essential for clearing the myelin debris and forming a physical 'guide tube' to direct the regenerating axonal sprouts back to their target?", options: ["A. Astrocytes", "B. Schwann cells", "C. Oligodendrocytes", "D. Microglia", "E. Fibroblasts"], correctAnswer: 1, explanation: "เฉลย: B. Schwann cells\nคำอธิบาย: Schwann cells ในระบบประสาทส่วนปลาย (PNS) มีบทบาทสำคัญในการย่อยสลายปลอกไมอีลินที่ตายแล้ว และยังเรียงตัวสร้างเป็นท่อ (Guide tube) เพื่อนำทางให้แขนงเส้นประสาทที่งอกใหม่เดินทางกลับไปถูกที่" },
        { question: "49. A 65-year-old male experiences an acute transmural myocardial infarction. During the healing process, the necrotic myocardium is gradually replaced by highly vascular granulation tissue. At approximately what time point post-infarction is this granulation tissue typically at its peak, making the ventricular wall maximally soft and most vulnerable to catastrophic rupture?", options: ["A. 1 to 3 days", "B. 7 to 14 days", "C. 1 month", "D. 3 months", "E. 1 year"], correctAnswer: 1, explanation: "เฉลย: B. 7 to 14 days\nคำอธิบาย: การสร้าง Granulation tissue เพื่อทดแทนกล้ามเนื้อหัวใจที่ตาย จะขึ้นสูงสุดในช่วง 7 ถึง 14 วัน (สัปดาห์ที่ 1-2) ซึ่งเป็นช่วงที่ผนังหัวใจจะนุ่มและเปราะบางที่สุด เสี่ยงต่อการแตกทะลุ (Myocardial rupture) ได้มากที่สุด" },
        { question: "50. Hepatocytes are stable cells, meaning they are normally quiescent and do not actively divide. However, when stimulated by liver injury or partial hepatectomy, they can rapidly proliferate. To initiate DNA replication, these cells must transition from their resting state to re-enter the active cell cycle. Which specific phase of the cell cycle are they exiting to achieve this?", options: ["A. G1 phase", "B. S phase", "C. G2 phase", "D. M phase", "E. G0 phase"], correctAnswer: 4, explanation: "เฉลย: E. G0 phase\nคำอธิบาย: เซลล์ชนิด Stable cells เช่น เซลล์ตับ ปกติจะพักอยู่ในระยะที่เรียกว่า G0 phase (Quiescent phase) เมื่อถูกกระตุ้น มันจะต้องออกจากระยะนี้เพื่อกลับเข้าสู่ G1 phase และเดินหน้าเข้าสู่การแบ่งตัวต่อไป" }
    ];

    // ==========================================
    // ตัวแปรและฟังก์ชันระบบหลัก
    // ==========================================
    let currentQuizData = [];
    let score = 0;
    let answeredCount = 0;

    function loadChapter(chapterNum) {
        // ซ่อนหน้าเมนู แสดงหน้าแบบทดสอบ
        document.getElementById('menu-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // กำหนดข้อมูลและชื่อบท
        let titleText = "";
        if (chapterNum === 1) {
            currentQuizData = chapter1Data;
            titleText = "บทที่ 1: Cell Injury, Cell Death, and Adaptations";
        } else if (chapterNum === 2) {
            currentQuizData = chapter2Data;
            titleText = "บทที่ 2: Acute and Chronic Inflammation";
        } else if (chapterNum === 3) {
            currentQuizData = chapter3Data;
            titleText = "บทที่ 3: Tissue Renewal, Regeneration, and Repair";
        }
        
        document.getElementById('chapter-title').innerText = titleText;
        document.getElementById('result-summary').style.display = 'none';
        
        // รีเซ็ตค่าคะแนน
        score = 0;
        answeredCount = 0;
        updateScoreTracker();
        
        // สร้างข้อสอบในหน้าเว็บ
        renderQuiz();
    }

    function backToMenu() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('menu-section').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderQuiz() {
        const quizContainer = document.getElementById('quiz-container');
        quizContainer.innerHTML = ''; // ล้างข้อสอบเก่า

        currentQuizData.forEach((q, index) => {
            let questionHTML = `
                <div class="question-box" id="q-box-${index}">
                    <div class="question-text">${q.question}</div>
                    <ul class="options">
            `;
            
            q.options.forEach((opt, optIndex) => {
                questionHTML += `
                    <li>
                        <label id="label-${index}-${optIndex}">
                            <input type="radio" name="q${index}" value="${optIndex}" onchange="checkAnswer(${index}, ${optIndex})">
                            ${opt}
                        </label>
                    </li>
                `;
            });

            questionHTML += `
                    </ul>
                    <div class="explanation" id="expl-${index}"></div>
                </div>
            `;
            quizContainer.innerHTML += questionHTML;
        });
    }

    function updateScoreTracker() {
        const total = currentQuizData.length;
        document.getElementById('score-tracker').innerText = `คะแนนปัจจุบัน: ${score} / ${total} | ทำไปแล้ว: ${answeredCount} / ${total} ข้อ`;
    }

    function checkAnswer(qIndex, selectedValue) {
        const q = currentQuizData[qIndex];
        const explDiv = document.getElementById(`expl-${qIndex}`);
        const qBox = document.getElementById(`q-box-${qIndex}`);
        const radios = document.querySelectorAll(`input[name="q${qIndex}"]`);
        const labels = document.querySelectorAll(`label[id^="label-${qIndex}"]`);

        // ล็อคไม่ให้เปลี่ยนคำตอบ
        radios.forEach(radio => radio.disabled = true);
        labels.forEach(label => label.classList.add('disabled'));

        // แสดงคำอธิบาย
        explDiv.style.display = "block";
        explDiv.innerHTML = q.explanation.replace(/\n/g, '<br>');

        // ไฮไลต์เฉลย
        const correctLabel = document.getElementById(`label-${qIndex}-${q.correctAnswer}`);
        correctLabel.classList.add('label-correct');

        if (selectedValue === q.correctAnswer) {
            score++;
            qBox.style.borderColor = "#28a745";
            explDiv.classList.add('correct-box');
        } else {
            const selectedLabel = document.getElementById(`label-${qIndex}-${selectedValue}`);
            selectedLabel.classList.add('label-incorrect');
            qBox.style.borderColor = "#dc3545";
            explDiv.classList.add('incorrect-box');
        }

        // อัปเดตคะแนน
        answeredCount++;
        updateScoreTracker();

        // ตรวจสอบว่าทำครบหรือยัง
        if (answeredCount === currentQuizData.length) {
            const summary = document.getElementById('result-summary');
            summary.style.display = "block";
            summary.innerHTML = `🎉 ยอดเยี่ยมมาก! คุณทำแบบทดสอบบทนี้เสร็จสิ้น<br>ได้คะแนนทั้งหมด ${score} / ${currentQuizData.length} คะแนน<br><br><button class="btn-back" onclick="backToMenu()">⬅ กลับไปหน้าเลือกบท</button>`;
        }
    }
</script>

</body>
</html>
