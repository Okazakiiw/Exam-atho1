            explanation: "เฉลย: C. Eotaxin\nคำอธิบาย: Eotaxin เป็น Chemokine ที่มีความจำเพาะเจาะจงสูงมาก (Selective) ในการดึงดูดเซลล์ Eosinophils ให้เข้ามาสะสมในเนื้อเยื่อ เช่น บริเวณหลอดลมในโรคหอบหืด"
        },
        {
            question: "49. A medical student is reviewing histological slides of inflamed tissues. She struggles to distinguish between 'granulation tissue' and a 'granuloma.' Which of the following fundamental cellular compositions correctly differentiates a granuloma from granulation tissue?",
            options: ["A. A granuloma consists of proliferating blood vessels and fibroblasts.", "B. A granuloma consists of an aggregate of epithelioid macrophages.", "C. A granuloma is a collection of neutrophils and liquefied debris.", "D. A granuloma is primarily composed of infiltrating plasma cells and lymphocytes.", "E. A granuloma is characterized by extensive deposition of dense Type I collagen."],
            correctAnswer: 1,
            explanation: "เฉลย: B. A granuloma consists of an aggregate of epithelioid macrophages.\nคำอธิบาย: Granuloma คือ 'กลุ่มก้อนของ Macrophages ที่เปลี่ยนรูปไป (Epithelioid cells)' ส่วน Granulation tissue คือ 'เนื้อเยื่อซ่อมแซม' ที่ประกอบด้วยหลอดเลือดงอกใหม่และ Fibroblasts"
        },
        {
            question: "50. A 40-year-old male presents with severe lobar pneumonia. His peripheral white blood cell count is 55,000 cells/µL (predominantly mature and immature neutrophils), mimicking leukemia. This extreme elevation of leukocytes in response to infection is known as a leukemoid reaction. Which laboratory test result would help confirm this is a reactive inflammatory response rather than Chronic Myeloid Leukemia (CML)?",
            options: ["A. Presence of the Philadelphia chromosome (t(9;22))", "B. Decreased Leukocyte Alkaline Phosphatase (LAP) score", "C. Elevated Leukocyte Alkaline Phosphatase (LAP) score", "D. Presence of Auer rods in the neutrophils", "E. Monoclonal expansion of B lymphocytes"],
            correctAnswer: 2,
            explanation: "เฉลย: C. Elevated Leukocyte Alkaline Phosphatase (LAP) score\nคำอธิบาย: Leukemoid reaction คือปฏิกิริยาของไขกระดูกที่สร้างเม็ดเลือดขาวออกมามากเพื่อสู้เชื้อโรค ทำให้ค่า LAP score สูงขึ้น (เนื่องจากเป็นเม็ดเลือดขาวที่ทำงานได้จริง) ตรงข้ามกับมะเร็งเม็ดเลือดขาว CML ที่ค่า LAP score จะต่ำ"
        }
    ];

    const quizContainer = document.getElementById('quiz-container');
    let score = 0;
    let answeredCount = 0;

    // สร้างคำถาม
    quizData.forEach((q, index) => {
        let questionHTML = `
            <div class="question-box" id="q-box-${index}">
                <div class="question-text">${q.question}</div>
                <ul class="options">
        `;
        
        q.options.forEach((opt, optIndex) => {
            questionHTML += `
                <li>
                    <label id="label-${index}-${optIndex}">
                        <input type="radio" name="q${index}" value="${optIndex}" onchange="checkAnswer(${index}, ${optIndex})">
                        ${opt}
                    </label>
                </li>
            `;
        });

        questionHTML += `
                </ul>
                <div class="explanation" id="expl-${index}"></div>
            </div>
        `;
        quizContainer.innerHTML += questionHTML;
    });

    // ฟังก์ชันตรวจคำตอบทันทีเมื่อคลิกเลือก
    function checkAnswer(qIndex, selectedValue) {
        const q = quizData[qIndex];
        const explDiv = document.getElementById(`expl-${qIndex}`);
        const qBox = document.getElementById(`q-box-${qIndex}`);
        const radios = document.querySelectorAll(`input[name="q${qIndex}"]`);
        const labels = document.querySelectorAll(`label[id^="label-${qIndex}"]`);

        // Disable options after selection
        radios.forEach(radio => radio.disabled = true);
        labels.forEach(label => label.classList.add('disabled'));

        // Show Explanation
        explDiv.style.display = "block";
        explDiv.innerHTML = q.explanation.replace(/\n/g, '<br>');

        // Highlight correct and incorrect answers
        const correctLabel = document.getElementById(`label-${qIndex}-${q.correctAnswer}`);
        correctLabel.classList.add('label-correct');

        if (selectedValue === q.correctAnswer) {
            score++;
            qBox.style.borderColor = "#28a745";
            explDiv.classList.add('correct-box');
        } else {
            const selectedLabel = document.getElementById(`label-${qIndex}-${selectedValue}`);
            selectedLabel.classList.add('label-incorrect');
            qBox.style.borderColor = "#dc3545";
            explDiv.classList.add('incorrect-box');
        }

        // Update Tracker
        answeredCount++;
        document.getElementById('score-tracker').innerText = `คะแนนปัจจุบัน: ${score} / 30 | ทำไปแล้ว: ${answeredCount} / 30 ข้อ`;

        // Check if all answered
        if (answeredCount === quizData.length) {
            const summary = document.getElementById('result-summary');
            summary.style.display = "block";
            summary.innerHTML = `ยอดเยี่ยมมาก! คุณทำแบบทดสอบพาร์ทที่ 2 เสร็จสิ้น<br>ได้คะแนนทั้งหมด ${score} / ${quizData.length} คะแนน`;
        }
    }
</script>
